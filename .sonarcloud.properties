# SonarCloud Automatic Analysis scope.
#
# Automatic Analysis ignores sonar-project.properties; .sonarcloud.properties on
# the default branch is the supported way to configure scope.
# https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis/

# Classify the suite as test code so MAIN-only rules (hardcoded IPs in
# fixtures, test credentials, tempfile usage) stop firing on tests.
sonar.tests=tests

# Drop artifacts that cannot be edited or are placeholders:
#  - Prisma migrations are immutable once applied, and are misparsed as PL/SQL
#    (the quoted identifiers PostgreSQL requires trip the Oracle ruleset).
#  - *.example.yaml hold placeholder secrets, not real credentials.
sonar.exclusions=packages/db/prisma/migrations/**,**/*.example.yaml
