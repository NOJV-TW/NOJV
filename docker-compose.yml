services:
  sandbox-image:
    profiles: ["sandbox-build"]
    build:
      context: .
      dockerfile: infra/docker/sandbox-runner.Dockerfile
    image: nojv-sandbox:local
    command: ["sh", "-lc", "echo sandbox image built"]

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nojv
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.28.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if command -v temporal >/dev/null 2>&1 && (temporal operator cluster health --address 127.0.0.1:7233 >/dev/null 2>&1 || temporal operator cluster health --address temporal:7233 >/dev/null 2>&1); then exit 0; fi; if command -v tctl >/dev/null 2>&1 && (tctl --address 127.0.0.1:7233 cluster health >/dev/null 2>&1 || tctl --address temporal:7233 cluster health >/dev/null 2>&1); then exit 0; fi; if command -v nc >/dev/null 2>&1 && (nc -z 127.0.0.1 7233 >/dev/null 2>&1 || nc -z temporal 7233 >/dev/null 2>&1); then exit 0; fi; exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s

  temporal-ui:
    image: temporalio/ui:2.38.2
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"

  migrator:
    profiles: ["deploy"]
    build:
      context: .
      dockerfile: infra/docker/migrator.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nojv
    restart: "no"

  web:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nojv
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-in-production}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-placeholder}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-placeholder}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nojv
      EXECUTION_BACKEND: docker
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      SANDBOX_CPU_LIMIT: "1"
      SANDBOX_IMAGE: nojv-sandbox:local
      SANDBOX_MEMORY_MB: "256"
      SANDBOX_PIDS_LIMIT: "64"
      PORT: "8080"
      WORKER_CONCURRENCY: "4"
      WORKER_MODE: "all"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8080/healthz').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
