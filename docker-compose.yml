services:
  sandbox-image:
    profiles: ["sandbox-build"]
    build:
      context: .
      dockerfile: infra/docker/sandbox-runner.Dockerfile
    image: nojv-sandbox:local
    command: ["sh", "-lc", "echo sandbox image built"]

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nojv
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nojv
      NEXT_PUBLIC_WORKSPACE_URL: http://workspace:4173
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"

  workspace:
    build:
      context: .
      dockerfile: infra/docker/workspace.Dockerfile
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "4173:4173"

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nojv
      REDIS_URL: redis://redis:6379
      SANDBOX_CPU_LIMIT: "1"
      SANDBOX_IMAGE: nojv-sandbox:local
      SANDBOX_MEMORY_MB: "256"
      SANDBOX_PIDS_LIMIT: "64"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  redis_data:
