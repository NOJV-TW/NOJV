services:
  sandbox-image:
    profiles: ["sandbox-build"]
    build:
      context: .
      dockerfile: infra/docker/sandbox-runner.Dockerfile
    image: nojv-sandbox:local
    command: ["sh", "-lc", "echo sandbox image built"]

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nojv
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nojv
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-in-production}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-placeholder}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-placeholder}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
    ports:
      - "3000:3000"

  worker:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nojv
      EXECUTION_BACKEND: docker
      REDIS_URL: redis://redis:6379
      SANDBOX_CPU_LIMIT: "1"
      SANDBOX_IMAGE: nojv-sandbox:local
      SANDBOX_MEMORY_MB: "256"
      SANDBOX_PIDS_LIMIT: "64"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  redis_data:
