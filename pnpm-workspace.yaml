packages:
  - apps/*
  - packages/*
  - tooling/*

catalog:
  # Cross-package shared core deps — must stay version-consistent.
  zod: ^4.3.6
  ioredis: ^5.10.1
  "@opentelemetry/api": ^1.9.1
  pino: ^10.3.1
  bcryptjs: ^3.0.3
  jszip: ^3.10.1
  rate-limiter-flexible: ^11.0.0

  # Temporal client + worker SDKs must match versions.
  "@temporalio/client": ^1.15.0
  "@temporalio/worker": ^1.15.0
  "@temporalio/activity": ^1.15.0
  "@temporalio/workflow": ^1.15.0
  "@temporalio/common": ^1.15.0

  # Prisma client + CLI + adapter must match.
  "@prisma/client": ^7.7.0
  "@prisma/adapter-pg": ^7.7.0
  prisma: ^7.7.0

  # Build / test tooling shared across packages.
  tsdown: ^0.21.7
  esbuild: ^0.28.0
  typescript: ^6.0.2
  vitest: ^4.1.3
  "@types/node": ^25.5.2
  "@playwright/test": ^1.59.1
