packages:
  - apps/*
  - packages/*
  - tooling/*

auditConfig:
  ignoreGhsas:
    - GHSA-vmh5-mc38-953g
    - GHSA-vxpw-j846-p89q
    - GHSA-hm92-r4w5-c3mj

overrides:
  kysely: 0.28.17
  protobufjs: 8.6.4
  "@temporalio/activity": 1.18.1
  "@temporalio/client": 1.18.1
  "@temporalio/common": 1.18.1
  "@temporalio/core-bridge": 1.18.1
  "@temporalio/nexus": 1.18.1
  "@temporalio/proto": 1.18.1
  "@temporalio/testing": 1.18.1
  "@temporalio/worker": 1.18.1
  "@temporalio/workflow": 1.18.1
  ws: ">=8.21.0"
  form-data: ">=4.0.6"
  js-yaml: ^4.2.0
  ts-deepmerge: ">=8.0.0"
  monaco-editor>dompurify: ">=3.4.11"
  isomorphic-dompurify>dompurify: ">=3.4.11"
  "@prisma/dev>@hono/node-server": ^1.19.13
  "@prisma/dev>hono": ">=4.12.25"
  "@sveltejs/kit>cookie": ^0.7.0
  tsx>esbuild: ^0.28.1

ignoredOptionalDependencies:
  - joi

onlyBuiltDependencies:
  - "@dodona/dolos-parsers"
  - "@prisma/engines"
  - "@swc/core"
  - esbuild
  - prisma
  - tree-sitter
  - tree-sitter-compat

patchedDependencies:
  tree-sitter@0.25.0: patches/tree-sitter@0.25.0.patch
  "@dodona/dolos-parsers@1.4.1": patches/@dodona__dolos-parsers@1.4.1.patch

catalog:
  # Cross-package shared core deps — must stay version-consistent.
  "@opentelemetry/api": ^1.9.1
  "@playwright/test": ^1.61.1
  "@prisma/adapter-pg": ^7.8.0

  # Prisma client + CLI + adapter must match.
  "@prisma/client": ^7.8.0
  "@temporalio/activity": ^1.19.0

  # Temporal client + worker SDKs must match versions.
  "@temporalio/client": ^1.19.0
  "@temporalio/common": ^1.16.2
  "@temporalio/worker": ^1.19.0
  "@temporalio/testing": ^1.19.0
  "@temporalio/workflow": ^1.19.0
  "@types/node": ^24.13.2
  bcryptjs: ^3.0.3
  esbuild: ^0.28.1
  ioredis: ^5.11.1
  jose: ^6.2.3
  jszip: ^3.10.1
  pino: ^10.3.1
  prisma: ^7.8.0
  rate-limiter-flexible: ^11.2.0

  # Build / test tooling shared across packages.
  tsdown: ^0.22.3
  typescript: ^6.0.3
  vitest: ^4.1.9
  zod: ^4.4.3
