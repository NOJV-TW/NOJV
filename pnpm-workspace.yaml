packages:
  - apps/*
  - packages/*
  - tooling/*

nodeOptions: --max-old-space-size=4096
engineStrict: true

overrides:
  kysely: 0.28.17
  protobufjs: 8.6.4
  "@temporalio/activity": 1.20.2
  "@temporalio/client": 1.20.2
  "@temporalio/common": 1.20.2
  "@temporalio/core-bridge": 1.20.2
  "@temporalio/nexus": 1.20.2
  "@temporalio/proto": 1.20.2
  "@temporalio/testing": 1.20.2
  "@temporalio/worker": 1.20.2
  "@temporalio/workflow": 1.20.2
  ws: ">=8.21.0"
  form-data: ">=4.0.6"
  "brace-expansion@>=2.0.0 <2.1.2": 2.1.2
  "brace-expansion@>=3.0.0 <5.0.7": 5.0.7
  js-yaml: ^4.3.0
  ts-deepmerge: ">=8.0.0"
  monaco-editor>dompurify: ">=3.4.11"
  isomorphic-dompurify>dompurify: ">=3.4.11"
  "@prisma/dev>@hono/node-server": ^1.19.13
  "@prisma/dev>hono": ">=4.12.25"
  "@sveltejs/kit>cookie": ^0.7.0
  tsx>esbuild: ^0.28.1
  fast-uri: 3.1.4

ignoredOptionalDependencies:
  - joi

allowBuilds:
  "@dodona/dolos-parsers": true
  "@prisma/engines": true
  "@swc/core": true
  esbuild: true
  prisma: true
  tree-sitter: true
  tree-sitter-compat: true

patchedDependencies:
  tree-sitter@0.25.0: patches/tree-sitter@0.25.0.patch
  "@dodona/dolos-parsers@1.4.1": patches/@dodona__dolos-parsers@1.4.1.patch

catalog:
  # Cross-package shared core deps — must stay version-consistent.
  "@opentelemetry/api": ^1.9.1
  "@playwright/test": ^1.61.1
  "@prisma/adapter-pg": ^7.8.0

  # Prisma client + CLI + adapter must match.
  "@prisma/client": ^7.8.0
  "@temporalio/activity": ^1.21.0

  # Temporal client + worker SDKs must match versions.
  "@temporalio/client": ^1.21.0
  "@temporalio/worker": ^1.21.0
  "@temporalio/testing": ^1.21.0
  "@temporalio/workflow": ^1.21.0
  "@types/node": ^24.13.3
  bcryptjs: ^3.0.3
  esbuild: ^0.28.1
  ioredis: ^5.11.1
  jose: ^6.2.3
  jszip: ^3.10.1
  pino: ^10.3.1
  prisma: ^7.8.0
  rate-limiter-flexible: ^11.2.0

  # Build / test tooling shared across packages.
  tsdown: ^0.22.5
  typescript: ^6.0.3
  vitest: 4.1.10
  zod: ^4.4.3
