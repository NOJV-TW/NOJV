packages:
  - apps/*
  - packages/*
  - tooling/*

catalog:
  # Cross-package shared core deps — must stay version-consistent.
  zod: ^4.4.3
  ioredis: ^5.10.1
  "@opentelemetry/api": ^1.9.1
  pino: ^10.3.1
  bcryptjs: ^3.0.3
  jszip: ^3.10.1
  rate-limiter-flexible: ^11.1.0

  # Temporal client + worker SDKs must match versions.
  "@temporalio/client": ^1.16.2
  "@temporalio/worker": ^1.16.2
  "@temporalio/activity": ^1.16.2
  "@temporalio/workflow": ^1.16.2
  "@temporalio/common": ^1.16.2

  # Prisma client + CLI + adapter must match.
  "@prisma/client": ^7.8.0
  "@prisma/adapter-pg": ^7.8.0
  prisma: ^7.8.0

  # Build / test tooling shared across packages.
  tsdown: ^0.22.0
  esbuild: ^0.28.0
  typescript: ^6.0.3
  vitest: ^4.1.7
  "@types/node": ^24.12.4
  "@playwright/test": ^1.60.0
