name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    if: github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Ensure infrastructure is running
        run: docker compose up -d --wait postgres redis temporal temporal-ui

      - name: Build sandbox image
        run: docker compose --profile sandbox-build build sandbox-image

      - name: Build production images
        run: docker compose --profile prod build web worker

      - name: Run database migrations
        run: docker compose --profile deploy run --rm migrator

      - name: Deploy application
        run: docker compose --profile prod up -d --wait --remove-orphans web worker

      - name: Verify deployment
        run: |
          curl -sf http://localhost:3000 > /dev/null && echo "Web: OK"
          docker compose --profile prod ps

      - name: Clean up old Docker images
        if: always()
        run: docker image prune -f --filter "until=168h"
