name: CD Deploy To Remote Server

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: cd-remote-server
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Passed Commit
    runs-on:
      - self-hosted
      - linux
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    timeout-minutes: 45
    steps:
      - name: Check out passed commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Print deployment target
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploying commit: ${{ github.event.workflow_run.head_sha }}"
          echo "Source workflow run: ${{ github.event.workflow_run.id }}"
          git rev-parse HEAD

      - name: Preflight checks
        shell: bash
        run: |
          set -euo pipefail
          : "${BETTER_AUTH_SECRET:?Missing BETTER_AUTH_SECRET in runner environment}"
          : "${BETTER_AUTH_URL:?Missing BETTER_AUTH_URL in runner environment}"
          docker --version
          docker compose version
          docker compose config >/dev/null

      - name: Ensure core infrastructure is running
        shell: bash
        run: |
          set -euo pipefail
          docker compose up -d --wait postgres redis temporal temporal-ui

      - name: Build runtime images for this commit
        shell: bash
        run: |
          set -euo pipefail
          docker compose --profile sandbox-build build sandbox-image
          docker compose --profile deploy build migrator
          docker compose --profile prod build web worker

      - name: Run database migrations
        shell: bash
        run: |
          set -euo pipefail
          docker compose --profile deploy run --rm migrator

      - name: Roll out web and worker
        shell: bash
        run: |
          set -euo pipefail
          docker compose --profile prod up -d --wait --remove-orphans web worker

      - name: Verify health checks
        shell: bash
        run: |
          set -euo pipefail

          curl -sf http://localhost:3000 >/dev/null
          echo "web: endpoint reachable"

          for service in web worker; do
            container_id="$(docker compose --profile prod ps -q "$service")"
            if [[ -z "$container_id" ]]; then
              echo "Missing container for service: $service" >&2
              exit 1
            fi

            health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id")"
            if [[ "$health" != "healthy" ]]; then
              echo "Service $service is not healthy (status=$health)" >&2
              exit 1
            fi
            echo "$service: healthy"
          done

          docker compose --profile prod ps

      - name: Dump diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set +e
          docker compose ps
          docker compose logs --no-color --tail=300 postgres redis temporal temporal-ui web worker
          for service in postgres redis temporal temporal-ui web worker; do
            container_id="$(docker compose ps -q "$service")"
            if [[ -n "$container_id" ]]; then
              docker inspect "$container_id"
            fi
          done

      - name: Clean up old Docker images
        if: always()
        shell: bash
        run: docker image prune -f --filter "until=168h"
