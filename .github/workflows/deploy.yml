name: CD Deploy To Remote Server

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref/sha to deploy (defaults to main HEAD)"
        required: false
        default: main

concurrency:
  group: cd-remote-server
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main')
    timeout-minutes: 40
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
      stale: ${{ steps.freshness.outputs.stale }}
    steps:
      - name: Check out passed commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.event.inputs.ref }}

      - name: Guard against stale re-run
        id: freshness
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "workflow_run" ]; then
            echo "Event $EVENT_NAME — freshness guard skipped (manual dispatch is the rollback override)."
            echo "stale=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --quiet origin main
          head_sha="$(git rev-parse HEAD)"
          origin_sha="$(git rev-parse FETCH_HEAD)"
          if [ "$head_sha" != "$origin_sha" ]; then
            echo "::notice::Checked-out HEAD $head_sha is not current origin/main $origin_sha — skipping stale deploy."
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "HEAD $head_sha is current origin/main — proceeding."
          echo "stale=false" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          echo "image_tag=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push runtime images
        if: steps.freshness.outputs.stale != 'true'
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.image_tag }}
          BUILD_TAG: main-${{ github.run_number }}
          PREFIX: ghcr.io/nojv-tw
        run: |
          set -euo pipefail
          build() {
            local name="$1" dockerfile="$2" ctx="$3"
            local ref="${PREFIX}/${name}"
            docker buildx build \
              -f "$dockerfile" \
              -t "${ref}:${TAG}" -t "${ref}:main" -t "${ref}:${BUILD_TAG}" \
              --cache-from "type=registry,ref=${ref}:buildcache" \
              --cache-to "type=registry,ref=${ref}:buildcache,mode=max" \
              --push \
              "$ctx"
          }
          build nojv-web          infra/docker/web.Dockerfile            .
          build nojv-worker       infra/docker/worker.Dockerfile         .
          build nojv-migrator     infra/docker/migrator.Dockerfile       .
          build nojv-sandbox      infra/docker/sandbox-runner.Dockerfile .
          build nojv-egress-proxy infra/docker/egress-proxy/Dockerfile   infra/docker/egress-proxy

  deploy:
    name: Deploy Passed Commit
    needs: build-push
    if: needs.build-push.outputs.stale != 'true'
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 30
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      NAMESPACE: nojv
      RELEASE: nojv
      IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.event.inputs.ref }}
    steps:
      - name: Check out passed commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.event.inputs.ref }}
          clean: false

      - name: Preflight checks
        shell: bash
        run: |
          set -euo pipefail

          require() { command -v "$1" >/dev/null 2>&1 || { echo "Missing required command: $1" >&2; exit 1; }; }
          require helm
          require kubectl

          kubectl cluster-info >/dev/null || { echo "kubectl cannot reach the cluster (KUBECONFIG=$KUBECONFIG)" >&2; exit 1; }

          if ! kubectl get crd clusters.postgresql.cnpg.io >/dev/null 2>&1; then
            echo "CloudNativePG operator not installed (clusters.postgresql.cnpg.io CRD missing). Install it once before deploying." >&2
            exit 1
          fi
          if ! kubectl -n "$NAMESPACE" get secret nojv-runtime-secrets >/dev/null 2>&1; then
            echo "Secret nojv-runtime-secrets missing in namespace $NAMESPACE. Create it once from infra/gcp/gke/runtime-secrets.example.yaml." >&2
            exit 1
          fi

          echo "Deploying image tag: $IMAGE_TAG (commit $HEAD_SHA)"

      - name: Deploy the Helm chart
        shell: bash
        run: |
          set -euo pipefail
          helm upgrade --install "$RELEASE" infra/charts/nojv \
            -f infra/charts/nojv/values-single-machine.yaml \
            --namespace "$NAMESPACE" --create-namespace \
            --set image.tag="${IMAGE_TAG}" \
            --wait --timeout 15m

      - name: Verify rollout health
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "$NAMESPACE" rollout status deploy/nojv-web --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/nojv-worker --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/nojv-worker-platform --timeout=300s
          kubectl -n "$NAMESPACE" get pods

      - name: Prune stale images (keep current + previous)
        shell: bash
        env:
          PREFIX: ghcr.io/nojv-tw
        run: |
          set +e
          current_rev=$(helm -n "$NAMESPACE" history "$RELEASE" -o json | jq -r 'max_by(.revision).revision')
          prev_tag=$(helm -n "$NAMESPACE" get values "$RELEASE" --revision "$((current_rev - 1))" -a -o json 2>/dev/null | jq -r '.image.tag // empty')
          if [ -z "$prev_tag" ]; then
            echo "::notice::Could not resolve previous image tag — skipping prune to preserve the rollback target."
            true
          else
            echo "Keeping image tags on this node: $IMAGE_TAG (current), $prev_tag (previous), main"
            for ref in $(sudo crictl images -o json | jq -r --arg p "$PREFIX/" '.images[].repoTags[]? | select(startswith($p))'); do
              tag="${ref##*:}"
              case "$tag" in
                "$IMAGE_TAG" | "$prev_tag" | main) ;;
                *)
                  echo "Removing stale image $ref"
                  sudo crictl rmi "$ref"
                  ;;
              esac
            done
            true
          fi

      - name: Dump diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set +e
          kubectl -n "$NAMESPACE" get pods -o wide
          kubectl -n "$NAMESPACE" describe deploy/nojv-web deploy/nojv-worker deploy/nojv-worker-platform
          kubectl -n "$NAMESPACE" logs -l app.kubernetes.io/name=nojv-web --tail=300
          kubectl -n "$NAMESPACE" logs -l app.kubernetes.io/name=nojv-worker --tail=300
          helm -n "$NAMESPACE" history "$RELEASE"

      - name: Roll back on failure
        if: failure()
        shell: bash
        run: |
          set +e
          if helm -n "$NAMESPACE" history "$RELEASE" >/dev/null 2>&1; then
            echo "::warning::Deploy failed — rolling back via 'helm rollback'."
            helm -n "$NAMESPACE" rollback "$RELEASE" --wait --timeout 10m
            if kubectl -n "$NAMESPACE" rollout status deploy/nojv-web --timeout=120s; then
              echo "Rollback verified healthy."
            else
              echo "::error::Rollback completed but nojv-web is NOT healthy — manual intervention required."
              exit 1
            fi
          else
            echo "::error::No prior Helm release to roll back to — manual recovery required."
          fi
