name: CD Deploy To Remote Server

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: cd-remote-server
  cancel-in-progress: false

permissions:
  contents: read

# Deploys the NOJV Helm umbrella chart (infra/charts/nojv) to the single-machine
# k3s cluster running on the self-hosted runner. Docker is used ONLY to build
# images and import them into k3s containerd — there is no Docker Compose deploy.
#
# One-time prerequisites on the runner's cluster (NOT done here):
#   - k3s with a NetworkPolicy-enforcing CNI (Calico/Cilium) — see docs/runbooks/k8s-single-machine.md
#   - the CloudNativePG operator (provides the Postgres Cluster CRD)
#   - Temporal via the official Helm chart (temporal-frontend Service)
#   - the nojv-runtime-secrets Secret in namespace nojv (DATABASE_URL/REDIS_URL/S3_*/EDGE_TRUST_SECRET/...)
jobs:
  deploy:
    name: Deploy Passed Commit
    runs-on:
      - self-hosted
      - linux
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    timeout-minutes: 45
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      NAMESPACE: nojv
      RELEASE: nojv
    steps:
      - name: Check out passed commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          clean: false

      - name: Print deployment target
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploying commit: ${{ github.event.workflow_run.head_sha }}"
          echo "Source workflow run: ${{ github.event.workflow_run.id }}"
          git rev-parse HEAD

      - name: Preflight checks
        shell: bash
        run: |
          set -euo pipefail

          require() { command -v "$1" >/dev/null 2>&1 || { echo "Missing required command: $1" >&2; exit 1; }; }
          require docker
          require helm
          require kubectl

          kubectl cluster-info >/dev/null || { echo "kubectl cannot reach the cluster (KUBECONFIG=$KUBECONFIG)" >&2; exit 1; }

          if ! kubectl get crd clusters.postgresql.cnpg.io >/dev/null 2>&1; then
            echo "CloudNativePG operator not installed (clusters.postgresql.cnpg.io CRD missing). Install it once before deploying." >&2
            exit 1
          fi
          if ! kubectl -n "$NAMESPACE" get secret nojv-runtime-secrets >/dev/null 2>&1; then
            echo "Secret nojv-runtime-secrets missing in namespace $NAMESPACE. Create it once from infra/gcp/gke/runtime-secrets.example.yaml." >&2
            exit 1
          fi

          IMAGE_TAG="$(git rev-parse --short=12 HEAD)"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "Resolved image tag: $IMAGE_TAG"

      - name: Build runtime images for this commit
        shell: bash
        run: |
          set -euo pipefail
          docker build -f infra/docker/web.Dockerfile -t "nojv/web:${IMAGE_TAG}" .
          docker build -f infra/docker/worker.Dockerfile -t "nojv/worker:${IMAGE_TAG}" .
          docker build -f infra/docker/migrator.Dockerfile -t "nojv/migrator:${IMAGE_TAG}" .
          docker build -f infra/docker/sandbox-runner.Dockerfile -t "nojv/sandbox:${IMAGE_TAG}" .
          docker build -t "nojv/egress-proxy:${IMAGE_TAG}" infra/docker/egress-proxy

      - name: Import images into k3s containerd
        shell: bash
        run: |
          set -euo pipefail
          for img in web worker migrator sandbox egress-proxy; do
            docker save "nojv/${img}:${IMAGE_TAG}" | sudo k3s ctr images import -
          done
          # Free the Docker build cache now that the images live in containerd.
          # On a small disk it can balloon to ~8GB and push the node into
          # DiskPressure during the rollout (evicting pods, incl. Postgres).
          docker builder prune -af >/dev/null 2>&1 || true

      - name: Deploy the Helm chart
        shell: bash
        run: |
          set -euo pipefail
          helm upgrade --install "$RELEASE" infra/charts/nojv \
            -f infra/charts/nojv/values-single-machine.yaml \
            --namespace "$NAMESPACE" --create-namespace \
            --set image.tag="${IMAGE_TAG}" \
            --wait --timeout 15m

      - name: Bootstrap prod admin (idempotent)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .env ]]; then set -a; source ./.env; set +a; fi
          if [[ -z "${SEED_ADMIN_USERNAME:-}" || -z "${SEED_ADMIN_EMAIL:-}" || -z "${SEED_ADMIN_PASSWORD:-}" ]]; then
            echo "SEED_ADMIN_* not set — skipping admin bootstrap (assuming an admin already exists)."
            exit 0
          fi
          echo "::add-mask::$SEED_ADMIN_PASSWORD"
          kubectl -n "$NAMESPACE" delete job nojv-bootstrap-admin --ignore-not-found
          kubectl -n "$NAMESPACE" apply -f - <<YAML
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: nojv-bootstrap-admin
            namespace: ${NAMESPACE}
          spec:
            backoffLimit: 1
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: bootstrap-admin
                    image: nojv/migrator:${IMAGE_TAG}
                    imagePullPolicy: IfNotPresent
                    command: ["sh", "-lc", "pnpm -C packages/db exec node --import tsx prisma/bootstrap-admin.ts"]
                    envFrom:
                      - secretRef:
                          name: nojv-runtime-secrets
                    env:
                      - { name: NODE_ENV, value: production }
                      - { name: SEED_ADMIN_USERNAME, value: "${SEED_ADMIN_USERNAME}" }
                      - { name: SEED_ADMIN_EMAIL, value: "${SEED_ADMIN_EMAIL}" }
                      - { name: SEED_ADMIN_PASSWORD, value: "${SEED_ADMIN_PASSWORD}" }
          YAML
          kubectl -n "$NAMESPACE" wait --for=condition=complete job/nojv-bootstrap-admin --timeout=180s

      - name: Verify rollout health
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "$NAMESPACE" rollout status deploy/nojv-web --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/nojv-worker --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/nojv-worker-platform --timeout=300s
          kubectl -n "$NAMESPACE" get pods

      - name: Dump diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set +e
          kubectl -n "$NAMESPACE" get pods -o wide
          kubectl -n "$NAMESPACE" describe deploy/nojv-web deploy/nojv-worker deploy/nojv-worker-platform
          kubectl -n "$NAMESPACE" logs -l app.kubernetes.io/name=nojv-web --tail=300
          kubectl -n "$NAMESPACE" logs -l app.kubernetes.io/name=nojv-worker --tail=300
          helm -n "$NAMESPACE" history "$RELEASE"

      - name: Roll back on failure
        if: failure()
        shell: bash
        run: |
          set +e
          if helm -n "$NAMESPACE" history "$RELEASE" >/dev/null 2>&1; then
            echo "::warning::Deploy failed — rolling back via 'helm rollback'."
            helm -n "$NAMESPACE" rollback "$RELEASE" --wait --timeout 10m
            if kubectl -n "$NAMESPACE" rollout status deploy/nojv-web --timeout=120s; then
              echo "Rollback verified healthy."
            else
              echo "::error::Rollback completed but nojv-web is NOT healthy — manual intervention required."
              exit 1
            fi
          else
            echo "::error::No prior Helm release to roll back to — manual recovery required."
          fi

      - name: Clean up dangling images
        if: always()
        shell: bash
        run: docker image prune -f --filter "until=168h"
