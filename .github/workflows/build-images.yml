name: Build & Push Images

on:
  push:
    branches:
      - main
    paths-ignore:
      - "infra/flux/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          echo "image_tag=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to the platform registry
        uses: docker/login-action@v3
        with:
          registry: registry.nojv.tw
          username: ${{ secrets.REGISTRY_PUSH_USER }}
          password: ${{ secrets.REGISTRY_PUSH_PASSWORD }}

      - name: Build & push runtime images
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.image_tag }}
          PREFIX: ghcr.io/nojv-tw
        run: |
          set -euo pipefail
          build() {
            local name="$1" dockerfile="$2" ctx="$3"
            local ref="${PREFIX}/${name}"
            docker buildx build \
              -f "$dockerfile" \
              -t "${ref}:${TAG}" -t "${ref}:main" \
              --cache-from "type=registry,ref=${ref}:buildcache" \
              --cache-to "type=registry,ref=${ref}:buildcache,mode=max" \
              --push \
              "$ctx"
          }
          build nojv-web          infra/docker/web.Dockerfile            .
          build nojv-worker       infra/docker/worker.Dockerfile         .
          build nojv-migrator     infra/docker/migrator.Dockerfile       .
          build nojv-sandbox      infra/docker/sandbox-runner.Dockerfile .
          build nojv-egress-proxy infra/docker/egress-proxy/Dockerfile   infra/docker/egress-proxy
          build_demo() {
            local name="$1" dockerfile="$2" ctx="$3"
            local ref="registry.nojv.tw/demo/${name}"
            docker buildx build \
              -f "$dockerfile" \
              -t "${ref}:${TAG}" -t "${ref}:main" \
              --cache-from "type=registry,ref=${ref}:buildcache" \
              --cache-to "type=registry,ref=${ref}:buildcache,mode=max" \
              --push \
              "$ctx"
          }
          build_demo nojv-demo-advanced-run   infra/docker/demo-advanced-run/Dockerfile   infra/docker/demo-advanced-run
          build_demo nojv-demo-advanced-grade infra/docker/demo-advanced-grade/Dockerfile infra/docker/demo-advanced-grade

      - name: Publish tag to the deploy branch (Flux tracks it → auto-pull)
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
        run: |
          set -euo pipefail
          git config user.name "nojv-deploy-bot"
          git config user.email "nojv-deploy-bot@users.noreply.github.com"
          git checkout -B deploy
          sed -i -E "s|^( +tag: ).*|\1${IMAGE_TAG}|" infra/flux/helmrelease.yaml
          git add infra/flux/helmrelease.yaml
          git commit -m "deploy: ${IMAGE_TAG}"
          git push --force origin deploy
