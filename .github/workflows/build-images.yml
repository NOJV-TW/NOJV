name: Build & Push Images

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: build-images-main
  cancel-in-progress: false

permissions: {}

jobs:
  prepare-release:
    name: Validate release
    if: >-
      github.event.workflow_run.name == 'CI' &&
      github.event.workflow_run.path == '.github/workflows/ci.yml' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      release_sha: ${{ steps.release.outputs.release_sha }}
      image_tag: ${{ steps.release.outputs.image_tag }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Validate trusted release run and exact checkout
        id: release
        env:
          RELEASE_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RELEASE_WORKFLOW_PATH: ${{ github.event.workflow_run.path }}
          RELEASE_EVENT: ${{ github.event.workflow_run.event }}
          RELEASE_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RELEASE_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RELEASE_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: node scripts/validate-release-run.mjs

  build-web:
    name: Build & push web image
    needs: prepare-release
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      digest: ${{ steps.image.outputs.digest }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect immutable publication state
        id: publication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_ROOT: ${{ github.api_url }}
          PACKAGE_OWNER: ${{ github.repository_owner }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.release_sha }}
        run: node scripts/validate-release-run.mjs publication-state

      - name: Build or verify web image
        id: image
        env:
          TAG: ${{ needs.prepare-release.outputs.image_tag }}
          PREFIX: ghcr.io/nojv-tw
          EXISTING_IMAGES: ${{ steps.publication.outputs.existing_images }}
          RELEASE_IMAGE_NAME: nojv-web
          RELEASE_DOCKERFILE: infra/docker/web.Dockerfile
        run: scripts/build-release-image.sh

      - name: Attest web image
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ghcr.io/nojv-tw/nojv-web
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Publish web release tag
        if: steps.image.outputs.requires_promotion == 'true'
        env:
          TAG: ${{ needs.prepare-release.outputs.image_tag }}
          PREFIX: ghcr.io/nojv-tw
          RELEASE_IMAGE_NAME: nojv-web
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
        run: scripts/promote-release-image.sh

  build-worker:
    name: Build & push worker image
    needs: prepare-release
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      digest: ${{ steps.image.outputs.digest }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect immutable publication state
        id: publication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_ROOT: ${{ github.api_url }}
          PACKAGE_OWNER: ${{ github.repository_owner }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.release_sha }}
        run: node scripts/validate-release-run.mjs publication-state

      - name: Build or verify worker image
        id: image
        env:
          TAG: ${{ needs.prepare-release.outputs.image_tag }}
          PREFIX: ghcr.io/nojv-tw
          EXISTING_IMAGES: ${{ steps.publication.outputs.existing_images }}
          RELEASE_IMAGE_NAME: nojv-worker
          RELEASE_DOCKERFILE: infra/docker/worker.Dockerfile
        run: scripts/build-release-image.sh

      - name: Attest worker image
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ghcr.io/nojv-tw/nojv-worker
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Publish worker release tag
        if: steps.image.outputs.requires_promotion == 'true'
        env:
          TAG: ${{ needs.prepare-release.outputs.image_tag }}
          PREFIX: ghcr.io/nojv-tw
          RELEASE_IMAGE_NAME: nojv-worker
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
        run: scripts/promote-release-image.sh

  build-migrator:
    name: Build & push migrator image
    needs: prepare-release
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      digest: ${{ steps.image.outputs.digest }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect immutable publication state
        id: publication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_ROOT: ${{ github.api_url }}
          PACKAGE_OWNER: ${{ github.repository_owner }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.release_sha }}
        run: node scripts/validate-release-run.mjs publication-state

      - name: Build or verify migrator image
        id: image
        env:
          TAG: ${{ needs.prepare-release.outputs.image_tag }}
          PREFIX: ghcr.io/nojv-tw
          EXISTING_IMAGES: ${{ steps.publication.outputs.existing_images }}
          RELEASE_IMAGE_NAME: nojv-migrator
          RELEASE_DOCKERFILE: infra/docker/migrator.Dockerfile
        run: scripts/build-release-image.sh

      - name: Attest migrator image
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ghcr.io/nojv-tw/nojv-migrator
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Publish migrator release tag
        if: steps.image.outputs.requires_promotion == 'true'
        env:
          TAG: ${{ needs.prepare-release.outputs.image_tag }}
          PREFIX: ghcr.io/nojv-tw
          RELEASE_IMAGE_NAME: nojv-migrator
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
        run: scripts/promote-release-image.sh

  build-sandbox:
    name: Build & push sandbox image
    needs: prepare-release
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      digest: ${{ steps.image.outputs.digest }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect immutable publication state
        id: publication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_ROOT: ${{ github.api_url }}
          PACKAGE_OWNER: ${{ github.repository_owner }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.release_sha }}
        run: node scripts/validate-release-run.mjs publication-state

      - name: Build or verify sandbox image
        id: image
        env:
          TAG: ${{ needs.prepare-release.outputs.image_tag }}
          PREFIX: ghcr.io/nojv-tw
          EXISTING_IMAGES: ${{ steps.publication.outputs.existing_images }}
          RELEASE_IMAGE_NAME: nojv-sandbox
          RELEASE_DOCKERFILE: infra/docker/sandbox-runner.Dockerfile
        run: scripts/build-release-image.sh

      - name: Attest sandbox image
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ghcr.io/nojv-tw/nojv-sandbox
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Publish sandbox release tag
        if: steps.image.outputs.requires_promotion == 'true'
        env:
          TAG: ${{ needs.prepare-release.outputs.image_tag }}
          PREFIX: ghcr.io/nojv-tw
          RELEASE_IMAGE_NAME: nojv-sandbox
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
        run: scripts/promote-release-image.sh

  deploy-ref:
    name: Publish verified image tag to deploy branch
    needs:
      - prepare-release
      - build-web
      - build-worker
      - build-migrator
      - build-sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Check out the verified release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}
          fetch-depth: 0

      - name: Verify deploy checkout
        env:
          RELEASE_SHA: ${{ needs.prepare-release.outputs.release_sha }}
        run: test "$(git rev-parse HEAD)" = "$RELEASE_SHA"

      - name: Fetch current deploy ref
        run: git fetch --no-tags origin +refs/heads/deploy:refs/remotes/origin/deploy

      - name: Reject stale deploy candidate
        id: advance
        env:
          RELEASE_SHA: ${{ needs.prepare-release.outputs.release_sha }}
        run: node scripts/validate-release-run.mjs deploy-advance

      - name: Publish immutable image references to the deploy branch
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.prepare-release.outputs.image_tag }}
          IMAGE_DIGEST_WEB: ${{ needs.build-web.outputs.digest }}
          IMAGE_DIGEST_WORKER: ${{ needs.build-worker.outputs.digest }}
          IMAGE_DIGEST_SANDBOX: ${{ needs.build-sandbox.outputs.digest }}
          IMAGE_DIGEST_MIGRATOR: ${{ needs.build-migrator.outputs.digest }}
          DEPLOY_TIP: ${{ steps.advance.outputs.deploy_tip }}
        run: |
          set -euo pipefail
          git config user.name "nojv-deploy-bot"
          git config user.email "nojv-deploy-bot@users.noreply.github.com"
          git checkout -B deploy
          VALUES_FILE=infra/charts/nojv/values-single-machine.yaml
          node scripts/update-deploy-image-values.mjs "$VALUES_FILE"
          git add "$VALUES_FILE"
          git commit -m "deploy: ${IMAGE_TAG}"
          DEPLOY_TAG="nojv-deploy-${IMAGE_TAG}"
          if git ls-remote --exit-code --tags origin "refs/tags/${DEPLOY_TAG}" >/dev/null 2>&1; then
            echo "Immutable deploy tag already exists: ${DEPLOY_TAG}" >&2
            exit 1
          fi
          git tag "$DEPLOY_TAG"
          git push --atomic "--force-with-lease=refs/heads/deploy:${DEPLOY_TIP}" origin \
            refs/heads/deploy:refs/heads/deploy \
            "refs/tags/${DEPLOY_TAG}:refs/tags/${DEPLOY_TAG}"
