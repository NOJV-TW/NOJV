name: Build & Push Images

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: build-images-main
  cancel-in-progress: false

permissions: {}

jobs:
  build-publish:
    name: Build & push images to GHCR
    if: >-
      github.event.workflow_run.name == 'CI' &&
      github.event.workflow_run.path == '.github/workflows/ci.yml' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    outputs:
      release_sha: ${{ steps.release.outputs.release_sha }}
      image_tag: ${{ steps.release.outputs.image_tag }}
      web_digest: ${{ steps.images.outputs.web_digest }}
      worker_digest: ${{ steps.images.outputs.worker_digest }}
      sandbox_digest: ${{ steps.images.outputs.sandbox_digest }}
      migrator_digest: ${{ steps.images.outputs.migrator_digest }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Validate trusted release run and exact checkout
        id: release
        env:
          RELEASE_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RELEASE_WORKFLOW_PATH: ${{ github.event.workflow_run.path }}
          RELEASE_EVENT: ${{ github.event.workflow_run.event }}
          RELEASE_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RELEASE_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RELEASE_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: node scripts/validate-release-run.mjs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push runtime images
        id: images
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.image_tag }}
          PREFIX: ghcr.io/nojv-tw
        run: |
          set -euo pipefail
          build() {
            local output_name="$1" name="$2" dockerfile="$3" ctx="$4"
            local ref="${PREFIX}/${name}"
            local metadata="$RUNNER_TEMP/${name}.json"
            docker buildx build \
              -f "$dockerfile" \
              -t "${ref}:${TAG}" \
              --cache-from "type=registry,ref=${ref}:buildcache" \
              --cache-to "type=registry,ref=${ref}:buildcache,mode=max" \
              --metadata-file "$metadata" \
              --push \
              "$ctx"
            local digest
            digest="$(node -e '
              const metadata = JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8"));
              const digest = metadata["containerimage.digest"];
              if (!/^sha256:[a-f0-9]{64}$/.test(digest ?? "")) process.exit(1);
              process.stdout.write(digest);
            ' "$metadata")"
            printf '%s_digest=%s\n' "$output_name" "$digest" >> "$GITHUB_OUTPUT"
          }
          build web      nojv-web      infra/docker/web.Dockerfile            .
          build worker   nojv-worker   infra/docker/worker.Dockerfile         .
          build migrator nojv-migrator infra/docker/migrator.Dockerfile       .
          build sandbox  nojv-sandbox  infra/docker/sandbox-runner.Dockerfile .

  deploy-ref:
    name: Publish verified image tag to deploy branch
    needs: build-publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Check out the verified release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.build-publish.outputs.release_sha }}
          fetch-depth: 0

      - name: Verify deploy checkout
        env:
          RELEASE_SHA: ${{ needs.build-publish.outputs.release_sha }}
        run: test "$(git rev-parse HEAD)" = "$RELEASE_SHA"

      - name: Fetch current deploy ref
        run: git fetch --no-tags origin +refs/heads/deploy:refs/remotes/origin/deploy

      - name: Reject stale deploy candidate
        id: advance
        env:
          RELEASE_SHA: ${{ needs.build-publish.outputs.release_sha }}
        run: node scripts/validate-release-run.mjs deploy-advance

      - name: Publish immutable image references to the deploy branch
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.build-publish.outputs.image_tag }}
          IMAGE_DIGEST_WEB: ${{ needs.build-publish.outputs.web_digest }}
          IMAGE_DIGEST_WORKER: ${{ needs.build-publish.outputs.worker_digest }}
          IMAGE_DIGEST_SANDBOX: ${{ needs.build-publish.outputs.sandbox_digest }}
          IMAGE_DIGEST_MIGRATOR: ${{ needs.build-publish.outputs.migrator_digest }}
          DEPLOY_TIP: ${{ steps.advance.outputs.deploy_tip }}
        run: |
          set -euo pipefail
          git config user.name "nojv-deploy-bot"
          git config user.email "nojv-deploy-bot@users.noreply.github.com"
          git checkout -B deploy
          VALUES_FILE=infra/charts/nojv/values-single-machine.yaml
          node scripts/update-deploy-image-values.mjs "$VALUES_FILE"
          git add "$VALUES_FILE"
          git commit -m "deploy: ${IMAGE_TAG}"
          DEPLOY_TAG="nojv-deploy-${IMAGE_TAG}"
          git tag --force "$DEPLOY_TAG"
          git push --atomic "--force-with-lease=refs/heads/deploy:${DEPLOY_TIP}" origin \
            refs/heads/deploy:refs/heads/deploy \
            "+refs/tags/${DEPLOY_TAG}:refs/tags/${DEPLOY_TAG}"
