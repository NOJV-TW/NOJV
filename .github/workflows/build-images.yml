name: Build & Push Images

on:
  push:
    branches:
      - main
    paths-ignore:
      - "infra/flux/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          echo "image_tag=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push runtime images
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.image_tag }}
          PREFIX: ghcr.io/nojv-tw
        run: |
          set -euo pipefail
          build() {
            local name="$1" dockerfile="$2" ctx="$3"
            local ref="${PREFIX}/${name}"
            docker buildx build \
              -f "$dockerfile" \
              -t "${ref}:${TAG}" -t "${ref}:main" \
              --cache-from "type=registry,ref=${ref}:buildcache" \
              --cache-to "type=registry,ref=${ref}:buildcache,mode=max" \
              --push \
              "$ctx"
          }
          build nojv-web          infra/docker/web.Dockerfile            .
          build nojv-worker       infra/docker/worker.Dockerfile         .
          build nojv-migrator     infra/docker/migrator.Dockerfile       .
          build nojv-sandbox      infra/docker/sandbox-runner.Dockerfile .

      - name: Publish tag to the deploy branch (Flux tracks it → auto-pull)
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
        run: |
          set -euo pipefail
          git config user.name "nojv-deploy-bot"
          git config user.email "nojv-deploy-bot@users.noreply.github.com"
          git checkout -B deploy
          VALUES_FILE=infra/charts/nojv/values-single-machine.yaml
          TAG_LINES="$(awk '
            /^image:$/ { in_image = 1; next }
            in_image && /^[^[:space:]]/ { in_image = 0 }
            in_image && /^  tag: / { print NR }
          ' "$VALUES_FILE")"
          TAG_COUNT="$(printf '%s\n' "$TAG_LINES" | awk 'NF { count++ } END { print count + 0 }')"
          if [ "$TAG_COUNT" -ne 1 ]; then
            echo "Expected exactly one image.tag in $VALUES_FILE, found $TAG_COUNT" >&2
            exit 1
          fi
          awk -v target="$TAG_LINES" -v tag="$IMAGE_TAG" '
            NR == target { print "  tag: " tag; next }
            { print }
          ' "$VALUES_FILE" >"${VALUES_FILE}.tmp"
          mv "${VALUES_FILE}.tmp" "$VALUES_FILE"
          git add "$VALUES_FILE"
          git commit -m "deploy: ${IMAGE_TAG}"
          DEPLOY_TAG="nojv-deploy-${IMAGE_TAG}"
          git tag --force "$DEPLOY_TAG"
          git push --atomic --force origin \
            refs/heads/deploy:refs/heads/deploy \
            "refs/tags/${DEPLOY_TAG}:refs/tags/${DEPLOY_TAG}"
