name: Release Cloud Production

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref to release (branch, tag, or SHA)
        required: true
        default: main
        type: string
      image_tag:
        description: Optional image tag override (defaults to commit short SHA)
        required: false
        type: string

concurrency:
  group: release-cloud-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Release to Cloud Production
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_ref }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to cloud
        shell: bash
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          REPOSITORY: ${{ vars.GCP_REPOSITORY }}
          SERVICE_PREFIX: ${{ vars.GCP_SERVICE_PREFIX }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          REDIS_URL: ${{ secrets.PROD_REDIS_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.PROD_BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.PROD_BETTER_AUTH_URL }}
          GITHUB_CLIENT_ID: ${{ secrets.PROD_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.PROD_GITHUB_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.PROD_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
        run: bash infra/gcp/deploy.sh
