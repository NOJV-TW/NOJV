name: Image Build

on:
  pull_request:
    paths:
      - "infra/docker/**"
      - "pnpm-lock.yaml"
      - "**/package.json"
      - "docker-compose.yml"

concurrency:
  group: image-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build deployable images
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runtime images
        run: |
          docker build -f infra/docker/web.Dockerfile -t nojv-web .
          docker build -f infra/docker/worker.Dockerfile -t nojv-worker .
          docker build -f infra/docker/migrator.Dockerfile -t nojv-migrator .
          docker build -f infra/docker/sandbox-runner.Dockerfile -t nojv-sandbox .
          docker build -t nojv-egress-proxy infra/docker/egress-proxy
