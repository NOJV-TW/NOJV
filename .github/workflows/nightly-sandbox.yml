name: Nightly Sandbox Isolation

# Builds the sandbox image (never built in PR CI) and runs the container
# under the exact hardening flags the worker's docker executor uses, so an
# isolation regression (seccomp/cap-drop/read-only/network/pids drift) is
# caught out-of-band. Scheduled + manual only — does NOT gate pull requests.
on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sandbox-isolation:
    name: Build sandbox image + isolation regression
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nojv_test
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nojv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Setup monorepo
        uses: ./.github/actions/setup

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build sandbox image
        run: pnpm sandbox:build

      - name: Build advanced run/grade/service demo images
        run: pnpm demo-advanced:build

      - name: Sandbox executor + isolation unit tests
        run: pnpm vitest run tests/unit/worker

      - name: Adversarial isolation + seed smoke suite (real images, must not skip)
        env:
          REQUIRE_SANDBOX_IMAGE: "1"
          REQUIRE_ADVANCED_DEMO_IMAGES: "1"
          REQUIRE_SEED_SMOKE: "1"
        run: pnpm vitest run tests/integration/judge

      - name: Isolation — sandbox process runs as non-root (uid 10001)
        run: |
          uid=$(docker run --rm --user 10001:10001 nojv-sandbox:local \
            node -e 'process.stdout.write(String(process.getuid()))')
          echo "sandbox uid=$uid"
          test "$uid" = "10001"

      - name: Isolation — root filesystem is read-only
        run: |
          if docker run --rm --read-only \
            --tmpfs /tmp:rw,exec,nosuid,nodev,size=64m \
            --user 10001:10001 nojv-sandbox:local \
            node -e 'require("fs").writeFileSync("/breakout","x")'; then
            echo "::error::write to read-only rootfs unexpectedly succeeded"
            exit 1
          fi
          echo "read-only rootfs enforced"

      - name: Isolation — no network egress (--network none)
        run: |
          if docker run --rm --network none nojv-sandbox:local \
            node -e 'require("dns").lookup("example.com",(e)=>process.exit(e?1:0))'; then
            echo "::error::DNS resolved under --network none"
            exit 1
          fi
          echo "network isolation enforced"

      - name: Isolation — dropped caps + no-new-privileges run cleanly
        run: |
          docker run --rm --network none --cap-drop ALL \
            --security-opt no-new-privileges --user 10001:10001 \
            --read-only --tmpfs /tmp:rw,exec,nosuid,nodev,size=64m \
            nojv-sandbox:local node -e 'process.exit(0)'

  k8s-isolation:
    name: K8s sandbox backend (real cluster, REQUIRE_K8S)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nojv_test
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nojv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Setup monorepo
        uses: ./.github/actions/setup

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.0

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build sandbox and advanced demo images
        run: |
          pnpm sandbox:build
          pnpm demo-advanced:build

      - name: Create k3d cluster with NetworkPolicy enforcement (Calico)
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d cluster create nojv-judge \
            --no-lb \
            --k3s-arg "--flannel-backend=none@server:*" \
            --k3s-arg "--disable-network-policy@server:*" \
            --k3s-arg "--disable=traefik@server:*"
          kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/calico.yaml
          kubectl -n kube-system rollout status deploy/calico-kube-controllers --timeout=180s

      - name: Load images into the cluster
        run: |
          k3d image import -c nojv-judge \
            nojv-sandbox:local \
            nojv-demo-advanced-run:local nojv-demo-advanced-grade:local \
            nojv-demo-advanced-service:local

      - name: Apply sandbox namespace, network policy, quota and label node
        run: |
          helm template nojv infra/charts/nojv -f infra/charts/nojv/values-single-machine.yaml \
            --show-only templates/namespaces.yaml \
            --show-only templates/sandbox-policy.yaml \
            | kubectl apply -f -
          kubectl label node --all nojv-role=sandbox --overwrite

      - name: K8s judge integration suite (must not skip)
        env:
          REQUIRE_K8S: "1"
        run: pnpm vitest run tests/integration/k8s
