name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nojv_test

jobs:
  verify:
    name: Verify Repository
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nojv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup monorepo
        uses: ./.github/actions/setup

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"

      - name: Build @nojv/storage dependency chain for seed validator
        run: pnpm --filter @nojv/storage... build

      - name: Validate problem seed definitions (dry-run)
        run: pnpm db:seed:validate

      - name: Verify migrations apply cleanly and match schema (no drift)
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c 'CREATE DATABASE nojv_migrate_check;'
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/nojv_migrate_check
          pnpm --filter @nojv/db exec prisma migrate deploy
          pnpm --filter @nojv/db exec prisma migrate diff \
            --from-config-datasource --to-schema prisma/schema --exit-code

      - name: Verify generated DB schema docs are in sync (no drift)
        run: |
          pnpm db:docs
          git diff --exit-code docs/architecture/DATABASE.generated.md

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.2.0

      - name: Lint and render the Helm umbrella chart
        run: |
          helm lint infra/charts/nojv
          helm template nojv infra/charts/nojv -f infra/charts/nojv/values-gke.yaml >/dev/null
          helm template nojv infra/charts/nojv -f infra/charts/nojv/values-single-machine.yaml >/dev/null

      - name: Verify monorepo (build, lint, typecheck, unit tests)
        run: pnpm ci:verify
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Run integration tests with coverage gate
        run: pnpm test:coverage
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup monorepo
        uses: ./.github/actions/setup

      # Hard gate: any high or critical advisory fails the build.
      # Moderate/low are reported by `pnpm audit` locally but not gated.
      # Suppress a genuinely-unfixable advisory via
      # `auditConfig.ignoreGhsas` in pnpm-workspace.yaml.
      - name: Audit dependencies (high + critical)
        run: pnpm audit --audit-level high
