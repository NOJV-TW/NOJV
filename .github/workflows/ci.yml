name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nojv_test

jobs:
  verify:
    name: Verify Repository
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nojv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup monorepo
        uses: ./.github/actions/setup

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      # Seed validator imports @nojv/storage at module load time (via
      # packages/db/prisma/seeds/problems.ts), so its dist/index.mjs must
      # exist before `db:seed:validate` runs — otherwise ERR_MODULE_NOT_FOUND.
      - name: Build @nojv/storage for seed validator
        run: pnpm --filter @nojv/storage build

      - name: Validate problem seed definitions (dry-run)
        run: pnpm db:seed:validate

      - name: Verify monorepo (build, lint, per-package tests)
        run: pnpm ci:verify
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests
        run: pnpm test:integration
