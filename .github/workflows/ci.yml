name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nojv_test

jobs:
  verify:
    name: Verify Repository
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nojv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup monorepo
        uses: ./.github/actions/setup

      - name: Validate problem seed definitions (dry-run)
        run: pnpm db:seed:validate

      - name: Verify monorepo (build, lint, per-package tests)
        run: pnpm ci:verify
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests
        run: pnpm test:integration

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nojv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup monorepo
        uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: pnpm --filter @nojv/web exec playwright install --with-deps chromium

      - name: Push schema to test database
        run: pnpm db:generate && pnpm db:push

      - name: Build application
        run: pnpm build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Run E2E tests
        run: pnpm --filter @nojv/web exec playwright test --config ../../tests/e2e/playwright.config.ts

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
