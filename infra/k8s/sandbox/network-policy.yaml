apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-sandbox
  namespace: nojv-sandbox
spec:
  podSelector:
    matchLabels:
      app: nojv-sandbox
  policyTypes:
    - Ingress
    - Egress
  ingress: [] # No inbound traffic allowed
  egress: [] # No outbound traffic allowed (no DNS, no internet)
