apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-sandbox
  namespace: nojv-sandbox
spec:
  # Selects every sandbox Pod EXCEPT those carrying nojv.egress=<value> (advanced
  # allowlist/service run + grade Pods), which escape deny-all and are governed by
  # their own per-submission NetworkPolicy. NetworkPolicy is additive, so deny-all
  # must NOT match a Pod that a per-submission allow policy needs to widen.
  podSelector:
    matchExpressions:
      - key: nojv.egress
        operator: DoesNotExist
  policyTypes:
    - Ingress
    - Egress
  ingress: [] # No inbound traffic allowed
  egress: [] # No outbound traffic allowed (no DNS, no internet)
