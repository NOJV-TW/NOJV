apiVersion: v1
kind: LimitRange
metadata:
  name: sandbox-limits
  namespace: nojv-sandbox
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 512Mi
      defaultRequest:
        cpu: "500m"
        memory: 256Mi
      max:
        cpu: "2"
        memory: 1Gi
      min:
        cpu: "100m"
        memory: 64Mi
