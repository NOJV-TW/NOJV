apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nojv
  namespace: nojv
spec:
  interval: 5m
  timeout: 125m
  releaseName: nojv
  targetNamespace: nojv
  chart:
    spec:
      chart: infra/charts/nojv
      valuesFiles:
        - infra/charts/nojv/values.yaml
        - infra/charts/nojv/values-single-machine.yaml
      sourceRef:
        kind: GitRepository
        name: nojv
        namespace: flux-system
      reconcileStrategy: Revision
  valuesFrom:
    - kind: Secret
      name: nojv-production-values
      valuesKey: values.yaml
      optional: false
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 0
      remediateLastFailure: false
