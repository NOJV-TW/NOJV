apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: nojv
  namespace: flux-system
spec:
  interval: 1m
  ref:
    # Flux tracks the CI-written `deploy` branch (= main + the built image tag),
    # not main. build-images.yml force-updates it on every push to main. This
    # closes auto-pull without git-write from the cluster (org deploy keys are
    # disabled) and without weakening main's branch protection.
    branch: deploy
  url: https://github.com/NOJV-TW/NOJV.git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nojv
  namespace: flux-system
spec:
  interval: 5m
  path: ./infra/flux
  # prune stays false: the CNPG database Cluster CR is Helm-managed on local-path
  # storage; a prune cascade could delete it and destroy student data. Do not
  # enable until the DB has resource-policy:keep, PV Retain, and a rehearsed
  # restore. See docs/plans/active/2026-07-08-flux-gitops-cutover.md.
  prune: false
  sourceRef:
    kind: GitRepository
    name: nojv
  wait: true
