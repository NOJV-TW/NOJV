{{- $annotations := deepCopy .Values.web.service.annotations }}
{{- if and .Values.web.ingress.enabled (eq .Values.web.ingress.className "gce") }}
{{- $edgeConfigName := printf "%s-web-edge" (include "nojv.fullname" .) }}
{{- $_ := set $annotations "cloud.google.com/backend-config" (printf "{\"default\":\"%s\"}" $edgeConfigName) }}
{{- $_ := set $annotations "cloud.google.com/neg" "{\"ingress\":true}" }}
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nojv.fullname" . }}-web
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
  {{- with $annotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | squote }}
    {{- end }}
  {{- end }}
spec:
  type: {{ .Values.web.service.type }}
  selector:
    app.kubernetes.io/name: nojv-web
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.web.service.type "NodePort") .Values.web.service.nodePort }}
      nodePort: {{ .Values.web.service.nodePort }}
      {{- end }}
