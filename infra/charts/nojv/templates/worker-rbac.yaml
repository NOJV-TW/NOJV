apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nojv.fullname" . }}-worker
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "nojv.fullname" . }}-sandbox-job-manager
  namespace: {{ include "nojv.sandboxNamespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "nojv.fullname" . }}-worker-sandbox-access
  namespace: {{ include "nojv.sandboxNamespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "nojv.fullname" . }}-sandbox-job-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "nojv.fullname" . }}-worker
    namespace: {{ include "nojv.namespace" . }}
