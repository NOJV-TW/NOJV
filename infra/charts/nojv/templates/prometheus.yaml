{{- if .Values.observability.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nojv.fullname" . }}-prometheus
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
    scrape_configs:
      - job_name: otel-collector
        static_configs:
          - targets:
              - {{ printf "%s-otel-collector.%s.svc:8889" (include "nojv.fullname" .) (include "nojv.namespace" .) | quote }}
      {{- if .Values.observability.prometheus.nodeExporter.enabled }}
      - job_name: node-exporter
        static_configs:
          - targets:
              - {{ printf "%s-node-exporter.%s.svc:9100" (include "nojv.fullname" .) (include "nojv.namespace" .) | quote }}
      {{- end }}
      {{- if eq .Values.postgres.mode "cnpg" }}
      - job_name: cnpg-postgres
        static_configs:
          - targets:
              - {{ printf "%s-metrics.%s.svc:9187" (include "nojv.cnpgClusterName" .) (include "nojv.namespace" .) | quote }}
      {{- end }}
    {{- with .Values.observability.prometheus.remoteWrite.url }}
    remote_write:
      - url: {{ . | quote }}
        {{- if $.Values.observability.prometheus.remoteWrite.username }}
        basic_auth:
          username: {{ $.Values.observability.prometheus.remoteWrite.username | quote }}
          password_file: /etc/prometheus-secrets/remote-write-password
        {{- end }}
    {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "nojv.fullname" . }}-prometheus
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.observability.prometheus.storageSize }}
  {{- with .Values.observability.prometheus.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nojv.fullname" . }}-prometheus
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nojv-prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nojv-prometheus
      annotations:
        checksum/config: {{ printf "%s-%v-%s-%s-%s" (.Values.observability.prometheus.retention | toString) .Values.observability.prometheus.nodeExporter.enabled .Values.observability.prometheus.remoteWrite.url .Values.observability.prometheus.remoteWrite.username .Values.postgres.mode | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: {{ .Values.observability.prometheus.image }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.observability.prometheus.retention }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
            {{- if .Values.observability.prometheus.remoteWrite.url }}
            - name: remote-write-secret
              mountPath: /etc/prometheus-secrets
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.observability.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "nojv.fullname" . }}-prometheus
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "nojv.fullname" . }}-prometheus
        {{- if .Values.observability.prometheus.remoteWrite.url }}
        - name: remote-write-secret
          secret:
            secretName: {{ include "nojv.runtimeSecretName" . }}
            items:
              - key: GRAFANA_CLOUD_PROM_PASSWORD
                path: remote-write-password
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nojv.fullname" . }}-prometheus
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  selector:
    app.kubernetes.io/name: nojv-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
{{- end }}
