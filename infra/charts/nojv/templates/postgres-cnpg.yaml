{{- if eq .Values.postgres.mode "cnpg" }}
{{/*
CloudNativePG Cluster CR. Requires the CloudNativePG operator installed
cluster-wide (documented prerequisite — its CRDs are not vendored here). The
operator creates a Secret named <cluster>-app and a Service <cluster>-rw; point
DATABASE_URL (in the runtime secret) at <cluster>-rw.<namespace>.svc:5432.
*/}}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "nojv.cnpgClusterName" . }}
  namespace: {{ include "nojv.namespace" . }}
  annotations:
    "helm.sh/resource-policy": keep
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  instances: {{ .Values.postgres.cnpg.instances }}
  imageName: {{ .Values.postgres.cnpg.imageName }}
  bootstrap:
    initdb:
      database: {{ .Values.postgres.cnpg.database }}
      owner: {{ .Values.postgres.cnpg.owner }}
  storage:
    size: {{ .Values.postgres.cnpg.storageSize }}
    {{- with .Values.postgres.cnpg.storageClass }}
    storageClass: {{ . }}
    {{- end }}
  {{- if .Values.postgres.cnpg.backup.enabled }}
  {{- $destinationPath := required "postgres.cnpg.backup.destinationPath is required when backup is enabled" .Values.postgres.cnpg.backup.destinationPath }}
  {{- $endpointURL := required "postgres.cnpg.backup.endpointURL is required when backup is enabled" .Values.postgres.cnpg.backup.endpointURL }}
  {{- $credentialsSecret := required "postgres.cnpg.backup.s3CredentialsSecret is required when backup is enabled" .Values.postgres.cnpg.backup.s3CredentialsSecret }}
  {{- $retentionPolicy := required "postgres.cnpg.backup.retentionPolicy is required when backup is enabled" .Values.postgres.cnpg.backup.retentionPolicy }}
  {{- if not (regexMatch "^s3://[^[:space:]]+$" $destinationPath) }}
  {{- fail "postgres.cnpg.backup.destinationPath must be an s3:// off-host path because this chart configures S3 credentials" }}
  {{- end }}
  {{- if not (regexMatch "^https://[^[:space:]]+$" $endpointURL) }}
  {{- fail "postgres.cnpg.backup.endpointURL must use HTTPS" }}
  {{- end }}
  {{- if not (regexMatch "^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$" $credentialsSecret) }}
  {{- fail "postgres.cnpg.backup.s3CredentialsSecret must be a valid Kubernetes Secret name" }}
  {{- end }}
  backup:
    retentionPolicy: {{ $retentionPolicy | quote }}
    barmanObjectStore:
      destinationPath: {{ $destinationPath | quote }}
      endpointURL: {{ $endpointURL | quote }}
      s3Credentials:
        accessKeyId:
          name: {{ $credentialsSecret }}
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: {{ $credentialsSecret }}
          key: ACCESS_SECRET_KEY
  {{- end }}
{{- if .Values.postgres.cnpg.backup.enabled }}
{{- $schedule := required "postgres.cnpg.backup.schedule is required when backup is enabled" .Values.postgres.cnpg.backup.schedule }}
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ include "nojv.cnpgClusterName" . }}-backup
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  schedule: {{ $schedule | quote }}
  backupOwnerReference: self
  cluster:
    name: {{ include "nojv.cnpgClusterName" . }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nojv.cnpgClusterName" . }}-metrics
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  selector:
    cnpg.io/cluster: {{ include "nojv.cnpgClusterName" . }}
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
{{- end }}
