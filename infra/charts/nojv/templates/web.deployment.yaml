{{/*
Web Deployment — ported from infra/gcp/web.cloudrun.yaml. Web now runs IN GKE
(not Cloud Run), fronted by Cloudflare. Keeps the /api/healthz startup+liveness
probes. Secrets come from the runtime secret (never templated here).
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nojv.fullname" . }}-web
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  {{- if not .Values.web.hpa.enabled }}
  replicas: {{ .Values.web.replicas }}
  {{- end }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nojv-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nojv-web
    spec:
      terminationGracePeriodSeconds: 60
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: {{ include "nojv.image" (dict "root" . "component" "web") }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - containerPort: {{ .Values.web.containerPort }}
              name: http
          env:
            - name: NODE_ENV
              value: {{ .Values.web.nodeEnv | quote }}
            - name: PORT
              value: {{ .Values.web.containerPort | quote }}
            {{- if .Values.web.advancedImageAllowedRegistries }}
            - name: ADVANCED_IMAGE_ALLOWED_REGISTRIES
              value: {{ .Values.web.advancedImageAllowedRegistries | quote }}
            {{- end }}
            {{- if .Values.registry.enabled }}
            - name: REGISTRY_PUBLIC_HOST
              value: {{ .Values.registry.host | quote }}
            - name: REGISTRY_INTERNAL_URL
              value: {{ .Values.registry.internalUrl | default (printf "http://%s-registry.%s.svc.cluster.local:5000" (include "nojv.fullname" .) (include "nojv.namespace" .)) | quote }}
            - name: REGISTRY_TOKEN_ISSUER
              value: {{ .Values.registry.token.issuer | quote }}
            - name: REGISTRY_TOKEN_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: REGISTRY_TOKEN_PRIVATE_KEY
                  optional: true
            - name: REGISTRY_TOKEN_CERT
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: REGISTRY_TOKEN_CERT
                  optional: true
            - name: REGISTRY_PULL_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: REGISTRY_PULL_PASSWORD_HASH
                  optional: true
            {{- end }}
            - name: DB_POOL_MAX
              value: {{ .Values.web.dbPoolMax | quote }}
            - name: S3_BUCKET
              value: {{ .Values.storage.bucket | quote }}
            - name: TEMPORAL_ADDRESS
              value: {{ .Values.temporal.address | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            {{- include "nojv.databaseUrlEnv" . | nindent 12 }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: REDIS_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: BETTER_AUTH_SECRET
            - name: BETTER_AUTH_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: BETTER_AUTH_URL
            # SvelteKit adapter-node canonical origin — required behind a
            # TLS-terminating edge (Cloudflare/proxy) so server-side form
            # actions pass the built-in cross-site Origin (CSRF) check instead
            # of deriving http:// from the plain-HTTP origin hop.
            - name: ORIGIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: BETTER_AUTH_URL
            # Transactional email (school-verification, notifications) via SMTP.
            # Optional — @nojv/mailer is a no-op until SMTP_HOST and SMTP_USER are
            # both set; SMTP_PASS is a provider app password, not a login password.
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: SMTP_HOST
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: SMTP_PORT
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: SMTP_PASS
                  optional: true
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: SMTP_FROM
                  optional: true
            # APP_BASE_URL intentionally reuses the BETTER_AUTH_URL secret key; an APP_BASE_URL key would be ignored.
            - name: APP_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: BETTER_AUTH_URL
                  optional: true
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: GITHUB_CLIENT_ID
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: GITHUB_CLIENT_SECRET
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: S3_ENDPOINT
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: S3_SECRET_KEY
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: S3_REGION
                  optional: true
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
                  optional: true
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: OTEL_EXPORTER_OTLP_HEADERS
                  optional: true
          startupProbe:
            httpGet:
              path: /api/healthz
              port: {{ .Values.web.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: {{ .Values.web.containerPort }}
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
        {{- if .Values.cloudsqlProxy.enabled }}
        - name: cloudsql-proxy
          image: {{ .Values.postgres.cloudsql.proxyImage }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - --address=127.0.0.1
            - --port=5432
            - --private-ip
            - --structured-logs
            - $(CLOUDSQL_INSTANCE_CONNECTION_NAME)
          env:
            - name: CLOUDSQL_INSTANCE_CONNECTION_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: CLOUDSQL_INSTANCE_CONNECTION_NAME
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
