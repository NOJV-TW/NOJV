{{- if .Values.storage.inCluster }}
{{/*
In-cluster MinIO (single node). For single-machine / dev. Root creds and the
S3_ENDPOINT come from the runtime secret (S3_ACCESS_KEY/S3_SECRET_KEY) — point
S3_ENDPOINT at this Service:
  http://<release>-minio.<namespace>.svc.cluster.local:9000
*/}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "nojv.fullname" . }}-minio
  namespace: {{ include "nojv.namespace" . }}
  annotations:
    "helm.sh/resource-policy": keep
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.storage.minio.storageSize }}
  storageClassName: {{ required "storage.minio.storageClass.name is required for in-cluster MinIO" .Values.storage.minio.storageClass.name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nojv.fullname" . }}-minio
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nojv-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nojv-minio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: {{ .Values.storage.minio.image }}
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: S3_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: S3_SECRET_KEY
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.storage.minio.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "nojv.fullname" . }}-minio
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nojv.fullname" . }}-minio
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  selector:
    app.kubernetes.io/name: nojv-minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
    - name: console
      port: 9001
      targetPort: console
{{- end }}
