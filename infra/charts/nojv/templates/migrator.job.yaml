{{- if .Values.migrator.enabled }}
{{/*
Release cutover Job. Installs migrate directly; upgrades stage additive migrations,
quiesce every DB writer, verify the S3 backfill, then expose the destructive contract.
The single Job owns pre-contract recovery so a failed check cannot strand workloads.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nojv.fullname" . }}-migrator
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrator
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: {{ .Values.migrator.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrator.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nojv-migrator
        {{- if .Values.cloudsqlProxy.enabled }}
        nojv-role: worker
        {{- end }}
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: {{ add .Values.maintenance.restoreTimeoutSeconds 90 }}
      serviceAccountName: {{ include "nojv.fullname" . }}-web-maintenance
      automountServiceAccountToken: true
      {{- with .Values.worker.judge.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrator
          image: {{ include "nojv.image" (dict "root" . "component" "migrator") }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              {{- .Files.Get "files/in-cluster-kubeconfig.sh" | nindent 14 }}
              exec sh packages/db/prisma/scripts/deploy-release.sh
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            {{- include "nojv.databaseUrlEnv" . | nindent 12 }}
            - name: RELEASE_OPERATION
              value: {{ ternary "upgrade" "install" .Release.IsUpgrade | quote }}
            - name: STATUS_TIMEOUT_SECONDS
              value: {{ .Values.migrator.statusTimeoutSeconds | quote }}
            - name: KUBECTL_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.maintenance.kubectlRequestTimeoutSeconds | quote }}
            - name: NAMESPACE
              value: {{ include "nojv.namespace" . | quote }}
            - name: WEB_DEPLOYMENT
              value: {{ printf "%s-web" (include "nojv.fullname" .) | quote }}
            - name: WEB_HPA
              value: {{ printf "%s-web" (include "nojv.fullname" .) | quote }}
            - name: WEB_HPA_ENABLED
              value: {{ .Values.web.hpa.enabled | quote }}
            - name: WEB_POD_SELECTOR
              value: app.kubernetes.io/name=nojv-web
            - name: JUDGE_DEPLOYMENT
              value: {{ printf "%s-worker" (include "nojv.fullname" .) | quote }}
            - name: JUDGE_KEDA_SCALED_OBJECT
              value: {{ printf "%s-worker" (include "nojv.fullname" .) | quote }}
            - name: JUDGE_KEDA_ENABLED
              value: {{ .Values.worker.judge.keda.enabled | quote }}
            - name: JUDGE_POD_SELECTOR
              value: app.kubernetes.io/name=nojv-worker
            - name: PLATFORM_DEPLOYMENT
              value: {{ printf "%s-worker-platform" (include "nojv.fullname" .) | quote }}
            - name: PLATFORM_POD_SELECTOR
              value: app.kubernetes.io/name=nojv-worker-platform
            - name: DRAIN_TIMEOUT_SECONDS
              value: {{ .Values.maintenance.drainTimeoutSeconds | quote }}
            - name: RESTORE_TIMEOUT_SECONDS
              value: {{ .Values.maintenance.restoreTimeoutSeconds | quote }}
            - name: POLL_INTERVAL_SECONDS
              value: {{ .Values.maintenance.pollIntervalSeconds | quote }}
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: S3_ENDPOINT
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: S3_SECRET_KEY
            - name: S3_BUCKET
              value: {{ .Values.storage.bucket | quote }}
            - name: S3_REGION
              value: {{ .Values.storage.region | quote }}
          resources:
            {{- toYaml .Values.migrator.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        {{- if .Values.cloudsqlProxy.enabled }}
        - name: cloudsql-proxy
          image: {{ .Values.postgres.cloudsql.proxyImage }}
          restartPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - --address=127.0.0.1
            - --port=5432
            - --private-ip
            - --structured-logs
            - $(CLOUDSQL_INSTANCE_CONNECTION_NAME)
          env:
            - name: CLOUDSQL_INSTANCE_CONNECTION_NAME
              value: {{ .Values.postgres.cloudsql.instanceConnectionName | quote }}
        {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
{{- end }}
