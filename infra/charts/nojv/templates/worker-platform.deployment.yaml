{{/*
PLATFORM Deployment — runs PLATFORM_TASK_QUEUE only (lifecycle reconciler,
submission sweeper, plagiarism). It never creates sandbox Jobs, but the worker
env schema still validates the full kubernetes config at boot, so the
K8s/sandbox vars below are required to avoid a crashloop.
*/}}
{{- $releaseMaintenance := and .Release.IsUpgrade .Values.migrator.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nojv.fullname" . }}-worker-platform
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-platform
spec:
  replicas: {{ ternary 0 .Values.worker.platform.replicas $releaseMaintenance }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nojv-worker-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nojv-worker-platform
        nojv-role: worker
        nojv-mailer: enabled
        nojv.tw/schema-contract: versioned-storage-v1
    spec:
      serviceAccountName: {{ include "nojv.fullname" . }}-worker-platform
      automountServiceAccountToken: {{ .Values.registry.enabled }}
      terminationGracePeriodSeconds: 120
      {{- with .Values.worker.platform.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: {{ include "nojv.image" (dict "root" . "component" "worker") }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: WORKER_MODE
              value: platform
            - name: MAILER_MODE
              value: smtp
            - name: EXECUTION_BACKEND
              value: kubernetes
            - name: K8S_NAMESPACE
              value: {{ include "nojv.sandboxNamespace" . }}
            - name: SANDBOX_IMAGE
              value: {{ include "nojv.image" (dict "root" . "component" "sandbox") }}
            {{- with .Values.worker.sandbox.imagePullSecret }}
            - name: K8S_IMAGE_PULL_SECRET
              value: {{ . | quote }}
            {{- end }}
            - name: WORKER_CONCURRENCY
              value: {{ .Values.worker.platform.concurrency | quote }}
            - name: SUBMISSION_PENDING_TIMEOUT_MINUTES
              value: {{ .Values.worker.platform.submissionPendingTimeoutMinutes | quote }}
            - name: K8S_CPU_REQUEST
              value: {{ .Values.worker.sandbox.cpuRequest | quote }}
            - name: K8S_CPU_LIMIT
              value: {{ .Values.worker.sandbox.cpuLimit | quote }}
            - name: K8S_MEMORY_REQUEST
              value: {{ .Values.worker.sandbox.memoryRequest | quote }}
            - name: K8S_MEMORY_LIMIT
              value: {{ .Values.worker.sandbox.memoryLimit | quote }}
            {{- if .Values.registry.enabled }}
            - name: REGISTRY_GC_IMAGE
              value: {{ .Values.registry.image | quote }}
            - name: REGISTRY_GC_NAMESPACE
              value: {{ include "nojv.namespace" . | quote }}
            - name: REGISTRY_GC_CONFIG_CONFIGMAP
              value: {{ printf "%s-registry-config" (include "nojv.fullname" .) | quote }}
            - name: REGISTRY_GC_S3_SECRET
              value: {{ include "nojv.runtimeSecretName" . | quote }}
            {{- end }}
            {{- include "nojv.databaseUrlEnv" . | nindent 12 }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: REDIS_URL
            - name: TEMPORAL_ADDRESS
              value: {{ .Values.temporal.address | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: S3_ENDPOINT
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: S3_SECRET_KEY
            - name: S3_BUCKET
              value: {{ .Values.storage.bucket | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
                  optional: true
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: OTEL_EXPORTER_OTLP_HEADERS
                  optional: true
            # Transactional email is mandatory for platform workers in production.
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: SMTP_HOST
            - name: SMTP_PORT
              value: {{ .Values.mailer.smtpPort | quote }}
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: SMTP_PASS
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: SMTP_FROM
            - name: APP_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "nojv.runtimeSecretName" . }}
                  key: APP_BASE_URL
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          ports:
            - containerPort: 8080
              name: health
          resources:
            {{- toYaml .Values.worker.platform.resources | nindent 12 }}
        {{- if .Values.cloudsqlProxy.enabled }}
        - name: cloudsql-proxy
          image: {{ .Values.postgres.cloudsql.proxyImage }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - --address=127.0.0.1
            - --port=5432
            - --private-ip
            - --structured-logs
            - $(CLOUDSQL_INSTANCE_CONNECTION_NAME)
          env:
            - name: CLOUDSQL_INSTANCE_CONNECTION_NAME
              value: {{ .Values.postgres.cloudsql.instanceConnectionName | quote }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
