{{- if and (eq .Values.web.nodeEnv "production") (not .Values.migrator.enabled) }}
{{- fail "Production deployments require the migration maintenance gate" }}
{{- end }}
{{- if .Values.migrator.enabled }}
{{- $webName := printf "%s-web" (include "nojv.fullname" .) -}}
{{- $readyReplicas := .Values.web.replicas -}}
{{- if .Values.web.hpa.enabled -}}
{{- $readyReplicas = .Values.web.hpa.min -}}
{{- end -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nojv.fullname" . }}-web-maintenance
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-maintenance
  annotations:
    helm.sh/hook: pre-upgrade,post-upgrade
    helm.sh/hook-weight: "-30"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "nojv.fullname" . }}-web-maintenance
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-maintenance
  annotations:
    helm.sh/hook: pre-upgrade,post-upgrade
    helm.sh/hook-weight: "-29"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames:
      - {{ $webName }}
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    resourceNames:
      - {{ $webName }}
    verbs: ["get", "patch", "update"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    resourceNames:
      - {{ $webName }}
    verbs: ["get", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "nojv.fullname" . }}-web-maintenance
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-maintenance
  annotations:
    helm.sh/hook: pre-upgrade,post-upgrade
    helm.sh/hook-weight: "-28"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "nojv.fullname" . }}-web-maintenance
subjects:
  - kind: ServiceAccount
    name: {{ include "nojv.fullname" . }}-web-maintenance
    namespace: {{ include "nojv.namespace" . }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nojv.fullname" . }}-web-drain
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-maintenance
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .Values.maintenance.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nojv-web-maintenance
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "nojv.fullname" . }}-web-maintenance
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: drain-web
          image: {{ .Values.maintenance.image | quote }}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              {{- .Files.Get "files/drain-web.sh" | nindent 14 }}
          env:
            - name: HOME
              value: /tmp
            - name: NAMESPACE
              value: {{ include "nojv.namespace" . | quote }}
            - name: WEB_DEPLOYMENT
              value: {{ $webName | quote }}
            - name: WEB_HPA
              value: {{ $webName | quote }}
            - name: WEB_POD_SELECTOR
              value: app.kubernetes.io/name=nojv-web
            - name: DRAIN_TIMEOUT_SECONDS
              value: {{ .Values.maintenance.drainTimeoutSeconds | quote }}
            - name: POLL_INTERVAL_SECONDS
              value: {{ .Values.maintenance.pollIntervalSeconds | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.maintenance.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nojv.fullname" . }}-web-ready
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-maintenance
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .Values.maintenance.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nojv-web-maintenance
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "nojv.fullname" . }}-web-maintenance
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wait-web-ready
          image: {{ .Values.maintenance.image | quote }}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              {{- .Files.Get "files/wait-web-ready.sh" | nindent 14 }}
          env:
            - name: HOME
              value: /tmp
            - name: NAMESPACE
              value: {{ include "nojv.namespace" . | quote }}
            - name: WEB_DEPLOYMENT
              value: {{ $webName | quote }}
            - name: READY_REPLICAS
              value: {{ $readyReplicas | quote }}
            - name: READY_TIMEOUT_SECONDS
              value: {{ .Values.maintenance.readyTimeoutSeconds | quote }}
            - name: POLL_INTERVAL_SECONDS
              value: {{ .Values.maintenance.pollIntervalSeconds | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.maintenance.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
{{- end }}
