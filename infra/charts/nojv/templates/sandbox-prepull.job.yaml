{{- if .Values.sandbox.prepull.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nojv.fullname" . }}-sandbox-prepull
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: sandbox-prepull
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: {{ .Values.sandbox.prepull.backoffLimit }}
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nojv-sandbox-prepull
    spec:
      restartPolicy: Never
      {{- with .Values.worker.judge.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sandbox
          image: {{ include "nojv.image" (dict "root" . "component" "sandbox") }}
          imagePullPolicy: Always
          command: ["/bin/true"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
{{- end }}
