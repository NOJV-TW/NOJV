{{- if and .Values.observability.prometheus.enabled .Values.observability.prometheus.nodeExporter.enabled }}
{{/*
Prometheus node_exporter DaemonSet — host filesystem / memory / load metrics.
Read-only hostPath mounts of /proc, /sys, and / (no hostNetwork/hostPID needed
for the filesystem collector). The in-cluster Prometheus scrapes the ClusterIP
Service below via static_configs (correct on a single node; on multi-node the
Service round-robins, so use kube-prometheus there instead). This is the metrics
source for the node-filesystem alert in infra/grafana/alerts/slo-alerts.json.
*/}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nojv.fullname" . }}-node-exporter
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: node-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nojv-node-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nojv-node-exporter
    spec:
      tolerations:
        - operator: Exists
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: node-exporter
          image: {{ .Values.observability.prometheus.nodeExporter.image }}
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
            - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 9100
              name: metrics
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              mountPropagation: HostToContainer
              readOnly: true
          resources:
            {{- toYaml .Values.observability.prometheus.nodeExporter.resources | nindent 12 }}
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nojv.fullname" . }}-node-exporter
  namespace: {{ include "nojv.namespace" . }}
  labels:
    {{- include "nojv.labels" . | nindent 4 }}
    app.kubernetes.io/component: node-exporter
spec:
  selector:
    app.kubernetes.io/name: nojv-node-exporter
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
{{- end }}
