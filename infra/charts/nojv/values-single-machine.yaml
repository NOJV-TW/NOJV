release:
  # build-images.yml replaces this with the exact main commit deployed by Flux.
  sourceSha: 5bc6c37cbf4698fea6d5ee79c7404ae1e0489365

image:
  registry: ghcr.io
  repositoryPrefix: nojv-tw
  tag: 5bc6c37cbf4698fea6d5ee79c7404ae1e0489365
  # The release workflow replaces these with Buildx's registry-returned digests
  # on the deploy branch. Empty values intentionally make direct renders fail.
  digests:
    web: sha256:24fbff5a38d6abf661743baf63c4ee3b1cc0140df59c27be40089eebea910d64
    worker: sha256:1984d50231044f0d23c38f16593c5d5904ed09fb47bcacfe02183b60ed0a9cef
    sandbox: sha256:116b141c7d1a8807c67ba740ba522dceef786f5c30d31fc5df0b1ffa2ed3640b
    migrator: sha256:10fb2d4c77b8494deab027be310bd7c2f745d913d54e5b125068a0b8ed20c1b0
  repositories:
    web: nojv-web
    worker: nojv-worker
    sandbox: nojv-sandbox
    migrator: nojv-migrator

postgres:
  mode: cnpg
  cnpg:
    instances: 1
    storageSize: 5Gi
    # DATA-SAFETY: this is the ONLY durable store (app + Temporal state) and a
    # single node has no HA. Production rendering fails until an off-host R2/S3
    # destination and existing Secret name are configured:
    #   1. kubectl -n nojv create secret generic nojv-pg-barman \
    #        --from-literal=ACCESS_KEY_ID=<r2-access-key> \
    #        --from-literal=ACCESS_SECRET_KEY=<r2-secret-key>
    #   2. fill destinationPath/endpointURL/s3CredentialsSecret below
    #   3. redeploy, verify `kubectl cnpg status nojv-pg -n nojv`
    #   4. run the recovery drill in the runbook before relying on it.
    backup:
      enabled: true
      destinationPath: "" # s3://nojv-db-backups/nojv-pg
      endpointURL: "" # https://<account>.r2.cloudflarestorage.com
      s3CredentialsSecret: "" # nojv-pg-barman
      retentionPolicy: "30d"
      schedule: "0 0 3 * * *"

cloudsqlProxy:
  enabled: false

redis:
  inCluster: true

storage:
  inCluster: true
  minio:
    storageClass:
      create: true
      name: nojv-minio-retain
      provisioner: rancher.io/local-path
      volumeBindingMode: WaitForFirstConsumer
    # DATA-SAFETY: in-cluster MinIO holds the ONLY copy of student submission
    # sources (see packages/storage keys). Production rendering fails until an
    # off-host R2/S3 destination and existing Secret name are configured:
    #   1. kubectl -n nojv create secret generic nojv-minio-mirror \
    #        --from-literal=ACCESS_KEY_ID=<r2-access-key> \
    #        --from-literal=ACCESS_SECRET_KEY=<r2-secret-key>
    #      (may reuse the nojv-pg-barman Secret if it targets the same account)
    #   2. fill destinationEndpoint/destinationBucket/credentialsSecret below
    #   3. redeploy, check the CronJob's first run logs.
    backup:
      enabled: true
      destinationEndpoint: "" # https://<account>.r2.cloudflarestorage.com
      destinationBucket: "" # nojv-minio-mirror
      destinationRegion: "auto"
      credentialsSecret: "" # nojv-minio-mirror

seed:
  enabled: true

web:
  replicas: 1
  advancedImageAllowedRegistries: "registry.nojv.tw,ghcr.io,docker.io,quay.io,registry.gitlab.com,gcr.io,public.ecr.aws,mcr.microsoft.com,registry.k8s.io"
  hpa:
    enabled: false
  ingress:
    enabled: false
  service:
    type: ClusterIP

registry:
  enabled: true
  host: registry.nojv.tw
  token:
    realm: https://nojv.tw/api/registry/token

edge:
  cloudflared:
    enabled: true

observability:
  collector:
    enabled: true
  prometheus:
    enabled: true
    # Node/disk metrics — closes the 2026-07-04 disk-full detection gap on the box.
    nodeExporter:
      enabled: true
  grafana:
    enabled: true

worker:
  judge:
    replicas: 1
  platform:
    replicas: 1
    submissionPendingTimeoutMinutes: 10
  sandbox:
    imagePullSecret: nojv-registry-pull

pdb:
  enabled: false

networkPolicy:
  enabled: false

sandbox:
  networkPolicy:
    enabled: true
  resourceQuota:
    enabled: true
    pods: "10"
    requestsCpu: "4"
    requestsMemory: "4Gi"
  limitRange:
    enabled: true
