image:
  registry: ghcr.io
  repositoryPrefix: nojv-tw
  tag: latest
  repositories:
    web: nojv-web
    worker: nojv-worker
    sandbox: nojv-sandbox
    egressProxy: nojv-egress-proxy
    migrator: nojv-migrator

postgres:
  mode: cnpg
  cnpg:
    instances: 1
    storageSize: 5Gi
    # DATA-SAFETY: this is the ONLY durable store (app + Temporal state) and a
    # single node has no HA. Backups are OFF until an off-host R2/S3 Secret
    # exists. To activate (see docs/runbooks/backup-restore.md):
    #   1. kubectl -n nojv create secret generic nojv-pg-barman \
    #        --from-literal=ACCESS_KEY_ID=<r2-access-key> \
    #        --from-literal=ACCESS_SECRET_KEY=<r2-secret-key>
    #   2. fill destinationPath/endpointURL/s3CredentialsSecret below
    #   3. set enabled: true, redeploy, verify `kubectl cnpg status nojv-pg -n nojv`
    #   4. run the recovery drill in the runbook before relying on it.
    backup:
      enabled: false
      destinationPath: "" # s3://nojv-db-backups/nojv-pg
      endpointURL: "" # https://<account>.r2.cloudflarestorage.com
      s3CredentialsSecret: "" # nojv-pg-barman
      retentionPolicy: "30d"
      schedule: "0 0 3 * * *"

cloudsqlProxy:
  enabled: false

redis:
  inCluster: true

storage:
  inCluster: true
  minio:
    # DATA-SAFETY: in-cluster MinIO holds the ONLY copy of student submission
    # sources (see packages/storage keys). Mirror is OFF until an off-host R2/S3
    # Secret exists. To activate (see docs/runbooks/backup-restore.md):
    #   1. kubectl -n nojv create secret generic nojv-minio-mirror \
    #        --from-literal=ACCESS_KEY_ID=<r2-access-key> \
    #        --from-literal=ACCESS_SECRET_KEY=<r2-secret-key>
    #      (may reuse the nojv-pg-barman Secret if it targets the same account)
    #   2. fill destinationEndpoint/destinationBucket/credentialsSecret below
    #   3. set enabled: true, redeploy, check the CronJob's first run logs.
    backup:
      enabled: false
      destinationEndpoint: "" # https://<account>.r2.cloudflarestorage.com
      destinationBucket: "" # nojv-minio-mirror
      destinationRegion: "auto"
      credentialsSecret: "" # nojv-minio-mirror

seed:
  enabled: true

web:
  replicas: 1
  advancedImageAllowedRegistries: "registry.nojv.tw,ghcr.io,docker.io,quay.io,registry.gitlab.com,gcr.io,public.ecr.aws,mcr.microsoft.com,registry.k8s.io"
  hpa:
    enabled: false
  ingress:
    enabled: false
  service:
    type: ClusterIP

registry:
  enabled: true
  host: registry.nojv.tw
  token:
    realm: https://nojv.tw/api/registry/token

edge:
  cloudflared:
    enabled: true

observability:
  collector:
    enabled: true
  prometheus:
    enabled: true
    # Node/disk metrics — closes the 2026-07-04 disk-full detection gap on the box.
    nodeExporter:
      enabled: true
  grafana:
    enabled: true

worker:
  judge:
    replicas: 1
  platform:
    replicas: 1
    submissionPendingTimeoutMinutes: 10
  sandbox:
    imagePullSecret: nojv-registry-pull

pdb:
  enabled: false

networkPolicy:
  enabled: false

sandbox:
  networkPolicy:
    enabled: true
  resourceQuota:
    enabled: true
    pods: "10"
    requestsCpu: "4"
    requestsMemory: "4Gi"
  limitRange:
    enabled: true
