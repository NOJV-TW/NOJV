image:
  registry: ""
  repositoryPrefix: nojv
  tag: latest

postgres:
  mode: cnpg
  cnpg:
    instances: 1
    storageSize: 5Gi
    backup:
      enabled: false

cloudsqlProxy:
  enabled: false

redis:
  inCluster: true

storage:
  inCluster: true

seed:
  enabled: true

web:
  replicas: 1
  hpa:
    enabled: false
  ingress:
    enabled: false
  # Exposed on a fixed NodePort so the host's cloudflared tunnel origin
  # (localhost:3000 -> nojv-edge-proxy -> this NodePort) stays stable across
  # redeploys. The edge-proxy injects the x-nojv-edge-secret trust header.
  service:
    type: NodePort
    nodePort: 32198

# In-cluster metrics stack (OTLP collector + Prometheus + Grafana). Apps export
# OTLP when OTEL_EXPORTER_OTLP_ENDPOINT is set in the runtime secret.
observability:
  collector:
    enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true

worker:
  judge:
    replicas: 1
  platform:
    replicas: 1

pdb:
  enabled: false

networkPolicy:
  enabled: false

sandbox:
  networkPolicy:
    enabled: true
  resourceQuota:
    enabled: true
    pods: "10"
    requestsCpu: "4"
    requestsMemory: "4Gi"
  limitRange:
    enabled: true
