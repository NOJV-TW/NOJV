image:
  registry: ghcr.io
  repositoryPrefix: nojv-tw
  tag: latest
  repositories:
    web: nojv-web
    worker: nojv-worker
    sandbox: nojv-sandbox
    egressProxy: nojv-egress-proxy
    migrator: nojv-migrator

postgres:
  mode: cnpg
  cnpg:
    instances: 1
    storageSize: 5Gi
    backup:
      enabled: false

cloudsqlProxy:
  enabled: false

redis:
  inCluster: true

storage:
  inCluster: true

seed:
  enabled: true

web:
  replicas: 1
  hpa:
    enabled: false
  ingress:
    enabled: false
  service:
    type: ClusterIP

edge:
  cloudflared:
    enabled: true

observability:
  collector:
    enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true

worker:
  judge:
    replicas: 1
  platform:
    replicas: 1
    submissionPendingTimeoutMinutes: 10

pdb:
  enabled: false

networkPolicy:
  enabled: false

sandbox:
  networkPolicy:
    enabled: true
  resourceQuota:
    enabled: true
    pods: "10"
    requestsCpu: "4"
    requestsMemory: "4Gi"
  limitRange:
    enabled: true
