namespace: nojv
sandboxNamespace: nojv-sandbox

release:
  # Verified source commit stamped into Helm object metadata by production deploys.
  sourceSha: ""

nameOverride: ""
fullnameOverride: ""

image:
  registry: asia-east1-docker.pkg.dev
  repositoryPrefix: PROJECT_ID/nojv
  tag: ""
  # Release automation must supply one verified manifest-list digest per image.
  # The chart refuses to render application workloads when any digest is absent.
  digests:
    web: ""
    worker: ""
    sandbox: ""
    migrator: ""
  # Narrow escape hatch for a local-only image loaded directly into a dev cluster.
  # When true, registry/prefix must be empty and tag must be exactly "local".
  allowUnpinnedLocalBuilds: false
  repositories:
    web: web
    worker: worker
    sandbox: sandbox
    migrator: migrator

postgres:
  mode: cnpg
  cnpg:
    instances: 1
    imageName: ghcr.io/cloudnative-pg/postgresql:18@sha256:17760b4508e1703f7bf3d5ee6c9335ff6d1bf62b034a3d5b32a43414a516789f
    storageSize: 10Gi
    storageClass: ""
    database: nojv
    owner: nojv
    # CloudNativePG barman-cloud backup → S3/R2 object storage (base backups +
    # continuous WAL archiving = point-in-time recovery). DEFAULT OFF: turning it
    # on requires an existing credentials Secret (see s3CredentialsSecret), so the
    # Cluster CR cannot reconcile until that Secret exists. Flip enabled=true only
    # AFTER creating the Secret. See docs/runbooks/backup-restore.md.
    backup:
      enabled: false
      # Bucket path the base backups + WAL land in, e.g. s3://nojv-db-backups/nojv-pg
      destinationPath: ""
      # S3-compatible endpoint. Cloudflare R2: https://<account>.r2.cloudflarestorage.com
      # (leave empty for AWS S3; set https://storage.googleapis.com for GCS).
      endpointURL: ""
      # Name of a Secret in this namespace with keys ACCESS_KEY_ID / ACCESS_SECRET_KEY.
      s3CredentialsSecret: ""
      retentionPolicy: "30d"
      schedule: "0 0 3 * * *"
  cloudsql:
    instanceConnectionName: PROJECT_ID:REGION:INSTANCE
    proxyImage: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0@sha256:19627ba27f0d6539f4fc62296c79bb122600f27c395e7698cf164739312c5e11

cloudsqlProxy:
  enabled: false

redis:
  inCluster: true
  image: redis:8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
  storageSize: 1Gi
  storageClass: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

storage:
  inCluster: true
  bucket: nojv
  region: auto
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    storageSize: 10Gi
    storageClass:
      create: true
      name: nojv-minio-retain
      provisioner: rancher.io/local-path
      volumeBindingMode: WaitForFirstConsumer
      parameters: {}
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Off-host mirror of the in-cluster MinIO bucket → S3/R2 (mc mirror CronJob).
    # In-cluster MinIO holds the ONLY copy of student submission sources, so this
    # is a data-safety backup, not a convenience. DEFAULT OFF: turning it on
    # requires the credentialsSecret below to exist (else the CronJob fails). The
    # CronJob is only rendered when storage.inCluster AND backup.enabled are true.
    # See docs/runbooks/backup-restore.md.
    backup:
      enabled: false
      image: minio/mc:RELEASE.2025-04-16T18-13-26Z@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
      # Cron (UTC). Default 04:00, an hour after the Postgres backup at 03:00.
      schedule: "0 4 * * *"
      # Off-host mirror target (an S3/R2 endpoint the MinIO PVC does not depend on).
      destinationEndpoint: "" # e.g. https://<account>.r2.cloudflarestorage.com
      destinationBucket: "" # e.g. nojv-minio-mirror
      destinationRegion: "auto"
      # Secret in this namespace with keys ACCESS_KEY_ID / ACCESS_SECRET_KEY
      # (can be the SAME Secret as postgres.cnpg.backup.s3CredentialsSecret).
      credentialsSecret: ""
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi

registry:
  # Self-hosted OCI registry (CNCF distribution) for teacher-built special_env
  # judge images. DEFAULT OFF: enabling it requires the REGISTRY_* runtime-secret
  # keys (see secret.example.yaml) and, for judge pulls, the dockerconfigjson
  # Secret named in worker.sandbox.imagePullSecret. Blobs live in the in-cluster
  # MinIO bucket below when storage.inCluster; otherwise set s3.regionendpoint.
  enabled: false
  image: registry:2.8.3@sha256:a3d8aaa63ed8681a604f1dea0aa03f100d5895b6a58ace528858a7b332415373
  # Public hostname teachers docker-push to (behind the edge tunnel).
  host: ""
  bucket: nojv-registry
  # In-cluster Service URL the web token endpoint / admin catalog calls. Empty =
  # http://<release>-registry.<ns>.svc.cluster.local:5000 (templated default).
  internalUrl: ""
  token:
    # Full public URL of the token endpoint the registry redirects clients to
    # (e.g. https://nojv.tw/api/registry/token).
    realm: ""
    issuer: nojv
  # S3 endpoint for the blob backend when storage.inCluster=false (the in-cluster
  # MinIO Service is used automatically otherwise).
  s3:
    regionendpoint: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

temporal:
  address: temporal-frontend.nojv-temporal.svc.cluster.local:7233
  namespace: default

observability:
  collector:
    enabled: false
    image: otel/opentelemetry-collector-contrib:0.122.1@sha256:0076e6c250bef16968e29e8f94177b87b5a851c79ce14b270e657f5f655b9e04
    remoteWriteUrl: ""
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
  prometheus:
    enabled: false
    image: prom/prometheus:v3.4.1@sha256:9abc6cf6aea7710d163dbb28d8eeb7dc5baef01e38fa4cd146a406dd9f07f70d
    retention: "15d"
    storageSize: 10Gi
    storageClass: ""
    # Push scraped series to Grafana Cloud Prometheus. OPT-IN: leave url empty to
    # disable (no remote_write block rendered). When set, username is the Grafana
    # Cloud instance ID (not secret) and the password is read from the runtime
    # secret key GRAFANA_CLOUD_PROM_PASSWORD, mounted as a file (never templated).
    remoteWrite:
      url: ""
      username: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    # Node/disk metrics source (host filesystem, memory, load). Closes the
    # detection gap behind the 2026-07-04 disk-full incident: without it,
    # Prometheus has no node_filesystem_* series and the disk-usage alert in
    # infra/grafana/alerts/slo-alerts.json has no data to fire on. When enabled,
    # prometheus.yml gains a static scrape job for the DaemonSet's ClusterIP
    # Service (correct on a single node; on multi-node use kube-prometheus).
    nodeExporter:
      enabled: false
      image: prom/node-exporter:v1.9.1@sha256:d00a542e409ee618a4edc67da14dd48c5da66726bbd5537ab2af9c1dfc442c8a
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
  grafana:
    enabled: false
    image: grafana/grafana:11.6.1@sha256:52c3e20686b860c6dc1f623811565773cf51eefa378817a4896dfc863c3c82c8
    adminUser: admin
    adminPassword: ""
    service:
      port: 3000
    ingress:
      enabled: false
      className: ""
      host: ""
      tls: []
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

secrets:
  runtimeSecretName: nojv-runtime-secrets

mailer:
  smtpPort: 465

web:
  replicas: 1
  containerPort: 3000
  nodeEnv: production
  advancedImageAllowedRegistries: ""
  dbPoolMax: "10"
  nodeSelector: {}
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  service:
    type: ClusterIP
    port: 80
    nodePort: ""
  hpa:
    enabled: false
    min: 2
    max: 15
    targetCPU: 70
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: nojv.example.com
    path: /
    pathType: Prefix
    tls: []

edge:
  cloudflared:
    enabled: false
    image: cloudflare/cloudflared:2026.6.1@sha256:6d91c121b803126f7a5344005d17a9324788fc09d305b6e2560ec6040a7ae283
    replicas: 2
    tokenSecret: nojv-cloudflared-token

worker:
  judge:
    replicas: 2
    concurrency: "4"
    nodeSelector: {}
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 1Gi
    keda:
      enabled: false
      min: 2
      max: 10
      prometheusAddress: ""
      query: ""
      threshold: "20"
  platform:
    replicas: 1
    concurrency: "4"
    submissionPendingTimeoutMinutes: 10
    nodeSelector: {}
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  sandbox:
    cpuRequest: "500m"
    cpuLimit: "1"
    memoryRequest: "256Mi"
    memoryLimit: "512Mi"
    # dockerconfigjson Secret (in the sandbox namespace, created out-of-band) added
    # to judge run/grade/service pods' imagePullSecrets so they can pull private
    # special_env images. Empty = no pull secret (K8S_IMAGE_PULL_SECRET unset).
    imagePullSecret: ""

pdb:
  enabled: false
  minAvailable: 1

sandbox:
  prepull:
    enabled: true
    backoffLimit: 1
  networkPolicy:
    enabled: true
  resourceQuota:
    enabled: true
    pods: "50"
    requestsCpu: "25"
    requestsMemory: "12Gi"
  limitRange:
    enabled: true
    default:
      cpu: "1"
      memory: 512Mi
    defaultRequest:
      cpu: "500m"
      memory: 256Mi
    max:
      cpu: "2"
      memory: 1Gi
    min:
      cpu: "100m"
      memory: 64Mi

networkPolicy:
  enabled: false
  temporalNamespace: nojv-temporal
  egress:
    redisCidr: 10.64.0.10/32
    cloudsqlCidr: 10.64.1.20/32
    cloudsqlPort: 3307
    googleApisCidrs:
      - 199.36.153.4/30
      - 199.36.153.8/30
    apiServerCidrs:
      - 10.96.0.1/32
      - 172.16.0.32/28

migrator:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  backoffLimit: 1

maintenance:
  image: docker.io/alpine/k8s:1.33.3@sha256:47e4ea4c263fb4e14e51d7c5ca841da756673f18e2340f38c0cf1f7219d05e85
  activeDeadlineSeconds: 360
  drainTimeoutSeconds: 180
  readyTimeoutSeconds: 300
  pollIntervalSeconds: 2
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

seed:
  enabled: false
  backoffLimit: 1
