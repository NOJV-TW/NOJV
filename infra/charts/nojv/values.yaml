# Default values for the NOJV umbrella chart. Override per environment with
# values-single-machine.yaml (everything in-cluster) or values-gke.yaml
# (Google-managed). See README.md for the full knob reference.
namespace: nojv
sandboxNamespace: nojv-sandbox

nameOverride: ""
fullnameOverride: ""

image:
  registry: asia-east1-docker.pkg.dev
  repositoryPrefix: PROJECT_ID/nojv
  tag: ""
  repositories:
    web: web
    worker: worker
    sandbox: sandbox
    egressProxy: egress-proxy
    migrator: migrator

# Database: cnpg = in-cluster CloudNativePG (HA + scheduled backup + PITR);
# cloudsql = Google Cloud SQL via the proxy sidecar; external = DATABASE_URL from the secret.
postgres:
  mode: cnpg
  cnpg:
    instances: 1
    imageName: ghcr.io/cloudnative-pg/postgresql:18
    storageSize: 10Gi
    storageClass: ""
    database: nojv
    owner: nojv
    backup:
      enabled: false
      destinationPath: ""
      endpointURL: ""
      s3CredentialsSecret: ""
      retentionPolicy: "30d"
      schedule: "0 0 3 * * *"
  cloudsql:
    instanceConnectionName: PROJECT_ID:REGION:INSTANCE
    proxyImage: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0

cloudsqlProxy:
  enabled: false

# inCluster true = deploy Redis here; false = external (Memorystore) via REDIS_URL in the secret.
redis:
  inCluster: true
  image: redis:8-alpine
  storageSize: 1Gi
  storageClass: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# Object storage (S3-compatible): inCluster true = deploy MinIO here; false = external
# (GCS / R2 / S3) via S3_* in the secret. Local dev uses MinIO from docker-compose.
storage:
  inCluster: true
  bucket: nojv
  region: auto
  minio:
    image: minio/minio:latest
    storageSize: 10Gi
    storageClass: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

temporal:
  address: temporal-frontend.nojv-temporal.svc.cluster.local:7233
  namespace: default

# In-cluster OTLP metrics ingestion. When collector.enabled=true, set
# OTEL_EXPORTER_OTLP_ENDPOINT (in the runtime secret) to this collector's
# Service: http://<release>-otel-collector.<namespace>.svc:4318
# The collector exposes :8889 /metrics for a Prometheus to scrape, unless
# remoteWriteUrl is set (then it remote-writes there instead). Prometheus +
# Grafana remain a documented prereq (kube-prometheus-stack / Google Managed
# Prometheus) — see docs/runbooks/observability-setup.md.
observability:
  collector:
    enabled: false
    image: otel/opentelemetry-collector-contrib:0.122.1
    remoteWriteUrl: ""
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

secrets:
  runtimeSecretName: nojv-runtime-secrets

web:
  replicas: 1
  containerPort: 3000
  nodeEnv: production
  executionBackend: kubernetes
  dbPoolMax: "10"
  nodeSelector: {}
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  service:
    type: ClusterIP
    port: 80
  hpa:
    enabled: false
    min: 2
    max: 15
    targetCPU: 70
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: nojv.example.com
    path: /
    pathType: Prefix
    tls: []

worker:
  judge:
    replicas: 2
    concurrency: "4"
    nodeSelector: {}
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 1Gi
  platform:
    replicas: 1
    concurrency: "4"
    nodeSelector: {}
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  sandbox:
    cpuRequest: "500m"
    cpuLimit: "1"
    memoryRequest: "256Mi"
    memoryLimit: "512Mi"

pdb:
  enabled: false
  minAvailable: 1

sandbox:
  networkPolicy:
    enabled: true
  resourceQuota:
    enabled: true
    pods: "50"
    requestsCpu: "25"
    requestsMemory: "12Gi"
  limitRange:
    enabled: true
    default:
      cpu: "1"
      memory: 512Mi
    defaultRequest:
      cpu: "500m"
      memory: 256Mi
    max:
      cpu: "2"
      memory: 1Gi
    min:
      cpu: "100m"
      memory: 64Mi

# Worker egress allow-list. The CIDRs below are GKE/VPC examples — replace with
# your cluster's Redis / Cloud SQL / API-server / Services-VIP ranges before enabling.
networkPolicy:
  enabled: false
  temporalNamespace: nojv-temporal
  egress:
    redisCidr: 10.64.0.10/32
    cloudsqlCidr: 10.64.1.20/32
    cloudsqlPort: 3307
    googleApisCidrs:
      - 199.36.153.4/30
      - 199.36.153.8/30
    apiServerCidrs:
      - 10.96.0.1/32
      - 172.16.0.32/28

migrator:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  backoffLimit: 1
