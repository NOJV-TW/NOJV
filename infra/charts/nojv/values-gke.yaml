image:
  registry: asia-east1-docker.pkg.dev
  repositoryPrefix: ""
  tag: ""

postgres:
  mode: cloudsql
  cloudsql:
    instanceConnectionName: ""
  cnpg:
    instances: 3
    storageSize: 50Gi
    backup:
      enabled: true
      destinationPath: s3://nojv-pg-backups/
      endpointURL: https://storage.googleapis.com
      s3CredentialsSecret: nojv-pg-backup-creds
      retentionPolicy: "30d"
      schedule: "0 0 3 * * *"

cloudsqlProxy:
  enabled: true
redis:
  inCluster: false
storage:
  inCluster: false
  region: auto

registry:
  enabled: true
  host: ""
  token:
    realm: ""
  s3:
    regionendpoint: https://storage.googleapis.com # blob backend (storage.inCluster=false)

seed:
  enabled: true

temporal:
  address: temporal-frontend.nojv-temporal.svc.cluster.local:7233
  namespace: default

web:
  replicas: 2
  nodeEnv: production
  advancedImageAllowedRegistries: ""
  hpa:
    enabled: true
    min: 2
    max: 15
    targetCPU: 70
  ingress:
    enabled: true
    className: gce
    host: ""
    tls: []
    gce:
      securityPolicy: ""
      httpsRedirect: true

worker:
  judge:
    replicas: 2
    nodeSelector:
      nojv-role: worker
  platform:
    replicas: 1
    nodeSelector:
      nojv-role: worker
  sandbox:
    imagePullSecret: nojv-registry-pull

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  temporalNamespace: nojv-temporal
  egress:
    redisCidr: ""
    cloudsqlCidr: ""
    cloudsqlPort: 3307
    googleApisCidrs: []
    apiServerCidrs: []

sandbox:
  networkPolicy:
    enabled: true
  resourceQuota:
    enabled: true
    pods: "50"
    requestsCpu: "25"
    requestsMemory: "12Gi"
  limitRange:
    enabled: true
