# EXAMPLE runtime secret for the NOJV chart. The chart NEVER templates secret
# values — create this secret out-of-band (kubectl apply / SOPS / External
# Secrets) in the app namespace, then set secrets.runtimeSecretName to match.
#
#   kubectl -n nojv apply -f secret.local.yaml   # your filled-in copy
#
# DO NOT commit a filled-in copy. The .helmignore excludes secret.local.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: nojv-runtime-secrets
  namespace: nojv
type: Opaque
stringData:
  # --- shared (web + worker) ---
  # postgres.mode=cnpg     : use the CNPG -rw service host (operator-managed pw in <cluster>-app):
  #   postgresql://nojv:<password>@nojv-pg-rw.nojv.svc.cluster.local:5432/nojv
  # postgres.mode=cloudsql : proxy on localhost (cloudsqlProxy.enabled=true):
  #   postgresql://USER:PASSWORD@127.0.0.1:5432/nojv
  # postgres.mode=external : any reachable Postgres URL.
  DATABASE_URL: "postgresql://nojv:CHANGE_ME@nojv-pg-rw.nojv.svc.cluster.local:5432/nojv"

  # redis.inCluster=true  -> redis://nojv-redis.nojv.svc.cluster.local:6379
  # redis.inCluster=false -> your Memorystore / managed Redis URL
  REDIS_URL: "redis://nojv-redis.nojv.svc.cluster.local:6379"

  # storage.inCluster=true  -> http://nojv-minio.nojv.svc.cluster.local:9000
  # storage.inCluster=false -> e.g. https://storage.googleapis.com
  S3_ENDPOINT: "http://nojv-minio.nojv.svc.cluster.local:9000"
  S3_ACCESS_KEY: "CHANGE_ME"
  S3_SECRET_KEY: "CHANGE_ME"
  S3_REGION: "auto"

  # --- web only ---
  BETTER_AUTH_SECRET: "CHANGE_ME_min_32_chars________________"
  BETTER_AUTH_URL: "https://nojv.example.com"
  EDGE_TRUST_SECRET: "CHANGE_ME_min_32_chars________________"
  # Optional OAuth providers (omit if unused — they are marked optional in the chart).
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""

  # --- production seed hook (required only when seed.enabled=true) ---
  SEED_ADMIN_USERNAME: "admin"
  SEED_ADMIN_EMAIL: "nojv.tw@gmail.com"
  SEED_ADMIN_PASSWORD: "CHANGE_ME_min_12_chars"

  # --- optional observability (OTLP metrics export; marked optional in the chart) ---
  # In-cluster collector (observability.collector.enabled=true):
  #   OTEL_EXPORTER_OTLP_ENDPOINT: "http://nojv-otel-collector.nojv.svc.cluster.local:4318"
  # Grafana Cloud: set the gateway URL + a Basic auth header.
  #   OTEL_EXPORTER_OTLP_HEADERS: "Authorization=Basic <base64(instanceId:token)>"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  OTEL_EXPORTER_OTLP_HEADERS: ""

  # --- only when postgres.mode=cloudsql (cloudsqlProxy.enabled=true) ---
  CLOUDSQL_INSTANCE_CONNECTION_NAME: "PROJECT_ID:REGION:INSTANCE"
