apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nojv-sandbox
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/container-concurrency: "1"
    spec:
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/sandbox:latest
          ports:
            - containerPort: 8080
          env:
            - name: SANDBOX_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: nojv-sandbox-token
