substitutions:
  _REGION: asia-east1
  _REPOSITORY: nojv
  _IMAGE_TAG: latest

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infra/docker/web.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/web:${_IMAGE_TAG}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infra/docker/worker.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/worker:${_IMAGE_TAG}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infra/docker/sandbox-runner.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/sandbox:${_IMAGE_TAG}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infra/docker/migrator.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/migrator:${_IMAGE_TAG}
      - .
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/web:${_IMAGE_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/worker:${_IMAGE_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/sandbox:${_IMAGE_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/migrator:${_IMAGE_TAG}
