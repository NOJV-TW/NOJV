apiVersion: apps/v1
kind: Deployment
metadata:
  name: nojv-sandbox
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nojv-sandbox
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nojv-sandbox
    spec:
      containers:
        - name: sandbox
          image: asia-east1-docker.pkg.dev/PROJECT_ID/nojv/sandbox:latest
          env:
            - name: PORT
              value: "8080"
            - name: SANDBOX_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  key: SANDBOX_SHARED_TOKEN
                  name: nojv-runtime-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
