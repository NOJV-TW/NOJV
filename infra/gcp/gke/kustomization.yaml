apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Resources below carry explicit metadata.namespace (nojv, nojv-sandbox,
# nojv-temporal). Don't set a top-level `namespace:` here — that would
# override the per-resource namespace and collapse everything into one.
resources:
  - namespace.yaml
  - network-policy.yaml
  - worker-rbac.yaml
  - worker.deployment.yaml
  - worker.pdb.yaml
  - temporal/postgres.yaml
  - temporal/temporal-server.yaml
  - temporal/temporal-ui.yaml
