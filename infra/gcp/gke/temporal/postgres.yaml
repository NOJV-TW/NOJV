# Dedicated Postgres for Temporal's own state (history + visibility).
# Deliberately separate from the application Cloud SQL — Temporal has its
# own schema and the auto-setup image owns it. Mixing them invites lock
# contention and complicates upgrades.
#
# Sized for the NOJV workload: low write rate (only judging activities
# and lifecycle workflows). If task throughput grows past ~1000 / sec,
# move to a managed Postgres (Cloud SQL with private IP via the proxy)
# and point the env vars at that instead.
apiVersion: v1
kind: Service
metadata:
  name: temporal-postgres
  namespace: nojv-temporal
spec:
  selector:
    app.kubernetes.io/name: temporal-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None # headless for the StatefulSet
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: temporal-postgres
  namespace: nojv-temporal
spec:
  serviceName: temporal-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal-postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999 # postgres user inside the image
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:15-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: temporal-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: temporal-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: temporal
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
