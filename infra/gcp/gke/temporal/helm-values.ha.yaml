# Self-host HA Temporal via the official temporal/temporal Helm chart (v1.4.x).
# Reviewed starting point — NOT cluster-validated here. Pin the chart version and verify
# `tctl cluster health` before production. See HA-PRODUCTION.md (Option B).
#
#   helm install temporal temporal/temporal \
#     -n nojv-temporal --create-namespace \
#     -f infra/gcp/gke/temporal/helm-values.ha.yaml
#
# Each server role (frontend/history/matching/worker) is its own Deployment.
# replicaCount: 2 gives every role 2 pods so a node drain/upgrade never stops the cluster.
server:
  replicaCount: 2
  config:
    persistence:
      defaultStore: default
      visibilityStore: visibility
      numHistoryShards: 512
      datastores:
        # Point at an HA database — a regional Cloud SQL instance reached via a
        # cloudsql-proxy sidecar, or CloudNativePG (as the nojv chart provisions).
        # Do NOT use a single-pod in-cluster Postgres for production.
        default:
          sql:
            pluginName: postgres12
            databaseName: temporal
            connectAddr: cloudsql-proxy.nojv-temporal.svc.cluster.local:5432
            connectProtocol: tcp
            user: temporal
            existingSecret: temporal-postgres-secret
            secretKey: password
            createDatabase: false
            manageSchema: true
            maxConns: 20
        visibility:
          sql:
            pluginName: postgres12
            databaseName: temporal_visibility
            connectAddr: cloudsql-proxy.nojv-temporal.svc.cluster.local:5432
            connectProtocol: tcp
            user: temporal
            existingSecret: temporal-postgres-secret
            secretKey: password
            createDatabase: false
            manageSchema: true
            maxConns: 20
  # Pin Temporal to the long-lived worker pool (off the autoscaling sandbox pool).
  nodeSelector:
    nojv-role: worker
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # Per-role PodDisruptionBudget — keeps >=1 pod up during voluntary disruptions.
  frontend:
    podDisruptionBudget:
      minAvailable: 1
  history:
    podDisruptionBudget:
      minAvailable: 1
  matching:
    podDisruptionBudget:
      minAvailable: 1
  worker:
    podDisruptionBudget:
      minAvailable: 1

# Built-in single-pod Postgres/Cassandra/Elasticsearch/Prometheus/Grafana subcharts
# were removed upstream (v1.0.0-rc.2). SQL visibility (above) needs no Elasticsearch.

# Temporal Web UI — not needed; the nojv app embeds its own dashboards.
web:
  enabled: false
