apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: nojv-temporal
spec:
  selector:
    app.kubernetes.io/name: temporal-ui
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: nojv-temporal
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal-ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ui
          image: temporalio/ui:2.30.0
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.nojv-temporal.svc.cluster.local:7233
            - name: TEMPORAL_CORS_ORIGINS
              value: http://localhost:3000
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
