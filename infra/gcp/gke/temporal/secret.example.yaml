# Copy to temporal-postgres-secret.yaml (gitignored) and fill in real values
# before applying. The auto-setup image reads these on first boot to create
# the temporal + visibility schemas; subsequent boots use them to connect.
apiVersion: v1
kind: Secret
metadata:
  name: temporal-postgres-secret
  namespace: nojv-temporal
type: Opaque
stringData:
  POSTGRES_USER: temporal
  # 32+ char random string; rotation requires restart of both postgres
  # and temporal-server pods, in that order.
  POSTGRES_PASSWORD: REPLACE_ME_BEFORE_APPLY
