apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nojv-sandbox
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nojv-sandbox
  minReplicas: 2
  maxReplicas: 30
  metrics:
    - resource:
        name: cpu
        target:
          averageUtilization: 70
          type: Utilization
      type: Resource
