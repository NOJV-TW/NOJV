apiVersion: v1
kind: Secret
metadata:
  name: nojv-runtime-secrets
type: Opaque
stringData:
  # The Cloud SQL Auth Proxy sidecar listens on 127.0.0.1:5432 inside the
  # worker pod. The proxy authenticates to Cloud SQL via Workload Identity,
  # so the password here can stay generic (Cloud SQL still enforces a real
  # password on the DB user; the proxy just brokers IAM-authenticated TLS).
  DATABASE_URL: postgresql://nojv:CHANGE_ME@127.0.0.1:5432/nojv
  REDIS_URL: redis://CHANGE_ME-memorystore-private-ip:6379
  # PROJECT_ID:REGION:INSTANCE_NAME — what the Cloud SQL Auth Proxy needs
  # to locate the instance. The proxy resolves this via the GCP API; no
  # DNS or VPC routing required.
  CLOUDSQL_INSTANCE_CONNECTION_NAME: PROJECT_ID:asia-east1:nojv-postgres
  S3_ENDPOINT: https://storage.googleapis.com
  S3_ACCESS_KEY: CHANGE_ME-hmac-access-key
  S3_SECRET_KEY: CHANGE_ME-hmac-secret
