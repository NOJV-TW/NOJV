apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-deny-egress
  namespace: nojv-sandbox
spec:
  # Selects every sandbox Pod EXCEPT those carrying nojv.egress=<value> (advanced
  # allowlist/service run + grade Pods), which escape deny-all and are governed by
  # their own per-submission NetworkPolicy. NetworkPolicy is additive, so deny-all
  # must NOT match a Pod that a per-submission allow policy needs to widen.
  podSelector:
    matchExpressions:
      - key: nojv.egress
        operator: DoesNotExist
  policyTypes:
    - Egress
    - Ingress
  egress: []
  ingress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: worker-egress
  namespace: nojv
spec:
  podSelector:
    matchLabels:
      nojv-role: worker
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              name: nojv-temporal
          podSelector:
            matchLabels:
              app.kubernetes.io/name: temporal-server
      ports:
        - port: 7233
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 10.64.0.10/32
      ports:
        - port: 6379
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 10.64.1.20/32
      ports:
        - port: 3307
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 199.36.153.4/30
        - ipBlock:
            cidr: 199.36.153.8/30
      ports:
        - port: 443
          protocol: TCP
    # kube-apiserver egress (mandatory: worker creates sandbox Jobs per submission).
    # REPLACE both CIDRs with your cluster's Services-VIP and control-plane (master) CIDRs.
    - to:
        - ipBlock:
            cidr: 10.96.0.1/32
        - ipBlock:
            cidr: 172.16.0.32/28
      ports:
        - port: 443
          protocol: TCP
