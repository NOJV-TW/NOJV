# Defence-in-depth: sandbox judges must be unable to reach anything outside
# the cluster, and unable to reach any in-cluster pod that isn't the worker
# itself (e.g. they can't talk to Temporal, the application Postgres, or
# the metadata server). The worker creates a Job here, reads its logs over
# the apiserver (allowed by Kubernetes itself, not subject to NetworkPolicy),
# then deletes it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-deny-egress
  namespace: nojv-sandbox
spec:
  podSelector: {}
  policyTypes:
    - Egress
    - Ingress
  egress: []
  ingress: []
---
# Worker pods talk to: Temporal (nojv-temporal), Memorystore Redis (outside
# the cluster), the application Cloud SQL via the Cloud SQL Auth Proxy
# sidecar (loopback), and the GKE control plane for sandbox-job CRUD.
# DNS to kube-system is required for resolving Temporal's ClusterIP.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: worker-egress
  namespace: nojv
spec:
  podSelector:
    matchLabels:
      nojv-role: worker
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Temporal frontend
    - to:
        - namespaceSelector:
            matchLabels:
              name: nojv-temporal
          podSelector:
            matchLabels:
              app.kubernetes.io/name: temporal-server
      ports:
        - port: 7233
          protocol: TCP
    # Memorystore Redis (egress to private IP — cluster needs the matching
    # CIDR allowed in firewall rules; this NetworkPolicy alone does not
    # open VPC routes, it only allows the pod-level egress).
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - port: 6379
          protocol: TCP
    # Cloud SQL via Cloud SQL Auth Proxy. Egress goes over Google's public
    # API endpoint (private.googleapis.com); the proxy handles auth.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32 # GCE metadata server — blocked outright
      ports:
        - port: 3307
          protocol: TCP
        - port: 443
          protocol: TCP
