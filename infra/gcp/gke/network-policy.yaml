apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-deny-egress
  namespace: nojv-sandbox
spec:
  podSelector: {}
  policyTypes:
    - Egress
    - Ingress
  egress: []
  ingress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: worker-egress
  namespace: nojv
spec:
  podSelector:
    matchLabels:
      nojv-role: worker
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              name: nojv-temporal
          podSelector:
            matchLabels:
              app.kubernetes.io/name: temporal-server
      ports:
        - port: 7233
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 10.64.0.10/32
      ports:
        - port: 6379
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 10.64.1.20/32
      ports:
        - port: 3307
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 199.36.153.4/30
        - ipBlock:
            cidr: 199.36.153.8/30
      ports:
        - port: 443
          protocol: TCP
