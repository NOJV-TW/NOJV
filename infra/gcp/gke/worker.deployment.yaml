apiVersion: apps/v1
kind: Deployment
metadata:
  name: nojv-worker
  namespace: nojv
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nojv-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nojv-worker
        nojv-role: worker
    spec:
      serviceAccountName: nojv-worker
      nodeSelector:
        nojv-role: worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: asia-east1-docker.pkg.dev/PROJECT_ID/nojv/worker:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: PORT
              value: "8080"
            - name: EXECUTION_BACKEND
              value: kubernetes
            - name: K8S_NAMESPACE
              value: nojv-sandbox
            - name: SANDBOX_IMAGE
              value: asia-east1-docker.pkg.dev/PROJECT_ID/nojv/sandbox:latest
            - name: EGRESS_PROXY_IMAGE
              value: asia-east1-docker.pkg.dev/PROJECT_ID/nojv/egress-proxy:latest
            - name: WORKER_CONCURRENCY
              value: "4"
            - name: K8S_CPU_REQUEST
              value: "500m"
            - name: K8S_CPU_LIMIT
              value: "1"
            - name: K8S_MEMORY_REQUEST
              value: "256Mi"
            - name: K8S_MEMORY_LIMIT
              value: "512Mi"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: DATABASE_URL
                  name: nojv-runtime-secrets
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  key: REDIS_URL
                  name: nojv-runtime-secrets
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.nojv-temporal.svc.cluster.local:7233
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  key: S3_ENDPOINT
                  name: nojv-runtime-secrets
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  key: S3_ACCESS_KEY
                  name: nojv-runtime-secrets
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: S3_SECRET_KEY
                  name: nojv-runtime-secrets
            - name: S3_BUCKET
              value: nojv
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          ports:
            - containerPort: 8080
              name: health
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
        - name: cloudsql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - --address=127.0.0.1
            - --port=5432
            - --private-ip
            - --structured-logs
            - $(CLOUDSQL_INSTANCE_CONNECTION_NAME)
          env:
            - name: CLOUDSQL_INSTANCE_CONNECTION_NAME
              valueFrom:
                secretKeyRef:
                  key: CLOUDSQL_INSTANCE_CONNECTION_NAME
                  name: nojv-runtime-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
