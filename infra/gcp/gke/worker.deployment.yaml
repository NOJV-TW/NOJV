apiVersion: apps/v1
kind: Deployment
metadata:
  name: nojv-worker
  namespace: nojv
spec:
  # Static 2 replicas for redundancy (a single pod being evicted during node
  # drain / image pull shouldn't halt judging). Throughput is gated by the
  # nojv-sandbox ResourceQuota, not worker count — orchestrator work is cheap
  # and mostly I/O. Introduce autoscaling only when Temporal task queue
  # backlog or activity latency is actually measured to be a bottleneck.
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nojv-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nojv-worker
        nojv-role: worker
    spec:
      serviceAccountName: nojv-worker
      # Pin the orchestrator workers to the stable node pool. Sandbox pods run
      # on a separate tainted pool so they can never starve the worker.
      nodeSelector:
        nojv-role: worker
      # Pod-level: refuse to run as root, apply container runtime's default
      # seccomp profile. uid/gid 1001 matches `USER appuser` in
      # infra/docker/worker.Dockerfile — keep these in sync if the Dockerfile
      # ever switches user/uid.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: asia-east1-docker.pkg.dev/PROJECT_ID/nojv/worker:latest
          # Container-level hardening. /tmp + the Node ipc socket need to be
          # writable, so we keep the rootfs read-only and back the writable
          # paths with emptyDir volumes below.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: PORT
              value: "8080"
            - name: EXECUTION_BACKEND
              value: kubernetes
            - name: K8S_NAMESPACE
              value: nojv-sandbox
            - name: SANDBOX_IMAGE
              value: asia-east1-docker.pkg.dev/PROJECT_ID/nojv/sandbox:latest
            - name: K8S_CPU_REQUEST
              value: "500m"
            - name: K8S_CPU_LIMIT
              value: "1"
            - name: K8S_MEMORY_REQUEST
              value: "256Mi"
            - name: K8S_MEMORY_LIMIT
              value: "512Mi"
            # Cloud SQL Auth Proxy listens on 127.0.0.1:5432 in this pod.
            # DATABASE_URL must point at localhost — the proxy handles
            # IAM auth + TLS to Cloud SQL.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: DATABASE_URL
                  name: nojv-runtime-secrets
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  key: REDIS_URL
                  name: nojv-runtime-secrets
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.nojv-temporal.svc.cluster.local:7233
            - name: TEMPORAL_NAMESPACE
              value: default
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          ports:
            - containerPort: 8080
              name: health
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
        # Cloud SQL Auth Proxy sidecar. Exposes the application Cloud SQL
        # instance on 127.0.0.1:5432 inside this pod via IAM auth — no
        # network exposure to other pods, no password in env. Workload
        # Identity binds the worker KSA to a GSA with roles/cloudsql.client;
        # see the README for the gcloud commands that wire that up.
        - name: cloudsql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - --address=127.0.0.1
            - --port=5432
            - --structured-logs
            - $(CLOUDSQL_INSTANCE_CONNECTION_NAME)
          env:
            - name: CLOUDSQL_INSTANCE_CONNECTION_NAME
              valueFrom:
                secretKeyRef:
                  key: CLOUDSQL_INSTANCE_CONNECTION_NAME
                  name: nojv-runtime-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
