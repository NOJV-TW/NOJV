apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: nojv-migrator
spec:
  template:
    template:
      spec:
        containers:
          - image: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/migrator:latest
            env:
              - name: DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    key: latest
                    name: nojv-database-url
        maxRetries: 1
        taskCount: 1
