apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nojv-web
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        # 15 instances × 80 concurrent ≈ 1200 simultaneous requests before queueing.
        # Sized for exam-week peaks (300 students submitting + navigating); bump higher
        # once real metrics show saturation rather than guessing.
        autoscaling.knative.dev/maxScale: "15"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/web:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: EXECUTION_BACKEND
              value: kubernetes
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: nojv-database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: nojv-redis-url
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: nojv-auth-secret
            - name: BETTER_AUTH_URL
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: nojv-auth-url
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: nojv-github-client-id
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: nojv-github-client-secret
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: nojv-google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: nojv-google-client-secret
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: nojv-s3-endpoint
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: nojv-s3-access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: nojv-s3-secret-key
            - name: S3_BUCKET
              value: nojv
